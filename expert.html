  {id:"map-19",cat:"compliance_status",q:"Should the compliance map show historical status (e.g., 'was Critical last month, now Warning')?",type:"single_choice",opts:["Current status only","Show trend arrows","Show last month comparison","Full history timeline"],ctx:"Map calculates current status only. No historical comparison.",imp:"medium",hint:"Historical comparison helps users see whether compliance is improving or declining."},
  {id:"map-20",cat:"compliance_status",q:"For the rule engine bridge, should PARTIAL compliance (50-79%) be WARNING instead of TASK?",type:"single_choice",opts:["TASK is correct for partial (current)","Should be WARNING","Depends on the regulation type","50-64% WARNING, 65-79% TASK"],ctx:"RuleEngineComplianceEntryBridge: PARTIAL (50-79%) -> TASK, NON_COMPLIANT (<50%) -> WARNING",imp:"high",hint:"Whether partial compliance is a task or a warning depends on how urgently it needs resolution."},
  {id:"map-21",cat:"compliance_status",q:"Should compliance entries hidden by one user affect the compliance map for other users?",type:"single_choice",opts:["No, hidden is per-user only (current)","Hidden entries should be excluded for all","Admin-hidden entries excluded for all","Never affect map calculations"],ctx:"hide_entry adds user_id to hidden_by_user_ids array. Map queries do not filter by hidden status.",imp:"high",hint:"Hidden entries still affect the compliance map status colors since the map query does not check hidden status."},

  // ══════════════════════════════════════════════════════════════════════════
  // KNOWLEDGE GRAPH — Additional questions (kg-6 to kg-20)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"kg-6",cat:"regulations",q:"Should the knowledge graph include 'market' as an entity type (linking regulations to specific markets)?",type:"yes_no",ctx:"ENTITY_TYPES = {'legal_act', 'standard', 'product'}. No market/jurisdiction entity.",imp:"medium",hint:"If yes, market entities enable queries like 'what regulations apply in Germany for category X?'"},
  {id:"kg-7",cat:"regulations",q:"Should the knowledge graph store bidirectional relationships or always infer the reverse?",type:"single_choice",opts:["Store both directions","Infer reverse at query time (current)","Store primary direction + reverse flag","Depends on relationship type"],ctx:"Relationships are stored as source->target. Queries check both directions.",imp:"medium",hint:"Storing both directions doubles storage but simplifies and speeds up queries."},
  {id:"kg-8",cat:"regulations",q:"Should the 'implements' relationship between standards and regulations carry metadata about which specific requirements are covered?",type:"yes_no",ctx:"Relationship types have no metadata beyond strength and detected_by.",imp:"high",hint:"If yes, requirement-level mapping enables precise compliance gap analysis."},
  {id:"kg-9",cat:"regulations",q:"Should the knowledge graph support 'negative' relationships (e.g., 'does NOT apply to')?",type:"yes_no",ctx:"All 8 relationship types are positive associations. No exclusion relationships exist.",imp:"medium",hint:"If yes, exemptions and non-applicability can be modeled in the graph."},
  {id:"kg-10",cat:"regulations",q:"Should the incremental graph build (3:15 AM) process all organizations or only those with recent changes?",type:"single_choice",opts:["All organizations","Only orgs with changes in last 24 hours","Only orgs with new products or regulations","Rotating schedule across organizations"],ctx:"build-knowledge-graph-incremental runs at 3:15 AM. Processing scope is unclear.",imp:"medium",hint:"Processing all organizations daily may be wasteful if most have no changes."},
  {id:"kg-11",cat:"regulations",q:"The default relationship strength is 0.5. Should AI-detected relationships start at a lower confidence?",type:"single_choice",opts:["0.5 for all (current)","AI-detected: 0.3, manually confirmed: 0.8","AI-detected: 0.5, expert-confirmed: 1.0","Confidence based on LLM model output"],ctx:"Default strength = 0.5 for all new relationships in _store_relationships.",imp:"medium",hint:"Distinguishing AI vs human-confirmed relationship confidence helps prioritize which relationships to trust."},
  {id:"kg-12",cat:"regulations",q:"Should the knowledge graph be queryable by end users, or only used internally by agents?",type:"single_choice",opts:["Internal agents only (current)","Expose via API for power users","Visual graph explorer in UI","Both API and visual explorer"],ctx:"Knowledge graph is accessed by SemanticKnowledgeGraphAgent. No user-facing API.",imp:"medium",hint:"A visual graph explorer could help users understand regulatory relationships affecting their products."},

  // ══════════════════════════════════════════════════════════════════════════
  // AI INTELLIGENCE — Additional questions (adv-8 to adv-25)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"adv-8",cat:"intelligence",q:"Should the Multi-LLM consensus require agreement from all models or just a majority?",type:"single_choice",opts:["All models must agree","Majority (2 out of 3)","Weighted by model accuracy","Configurable consensus threshold"],ctx:"MultiLLMValidationService uses consensus_achieved and consensus_confidence fields.",imp:"high",hint:"Requiring full consensus is safer but may block analyses when models disagree."},
  {id:"adv-9",cat:"intelligence",q:"Should the AI's confidence level be shown to users alongside compliance assessments?",type:"single_choice",opts:["Never show confidence","Always show confidence","Show when below threshold","Show on hover/expand"],ctx:"llm_confidence is stored on ImpactAnalysis but not typically displayed to end users.",imp:"high",hint:"Showing confidence helps users gauge reliability; hiding it may give false sense of certainty."},
  {id:"adv-10",cat:"intelligence",q:"Should the DynamicPriorityAgent be able to downgrade entry severity, or only upgrade?",type:"single_choice",opts:["Both upgrade and downgrade","Upgrade only (never reduce severity)","Downgrade after inactivity period","Only upgrade, manual downgrade"],ctx:"adjusted_priority_at and priority_adjustment_reason fields exist on ComplianceEntry.",imp:"high",hint:"Auto-downgrading severity could mask real issues; only upgrading keeps issues visible."},
  {id:"adv-11",cat:"intelligence",q:"Should the AI agents have access to historical compliance decisions to improve future accuracy?",type:"yes_no",ctx:"Agents operate on current data. No historical training or feedback loop mechanism.",imp:"critical",hint:"If yes, build a training dataset from past compliance decisions and their outcomes."},
  {id:"adv-12",cat:"intelligence",q:"Should the semantic change detector compare regulation text at the sentence level or paragraph level?",type:"single_choice",opts:["Paragraph level","Sentence level","Clause/article level","AI determines optimal granularity"],ctx:"SemanticChangeDetector performs AI-powered diff analysis at an unspecified granularity.",imp:"medium",hint:"Finer granularity catches more precise changes but increases processing cost."},
  {id:"adv-13",cat:"intelligence",q:"Should the system use AI to generate compliance action plans (not just identify issues)?",type:"yes_no",ctx:"System identifies compliance gaps but does not generate step-by-step action plans.",imp:"high",hint:"If yes, generate actionable plans: 'Step 1: Order EN 60601-1 testing, Step 2: Submit to Notified Body, ...'"},
  {id:"adv-14",cat:"intelligence",q:"Should the AI triage task (4:30 AM) be able to auto-dismiss false positive discoveries?",type:"single_choice",opts:["Auto-dismiss with confidence > 95%","Flag for human review (current)","Auto-dismiss with logging","Never auto-dismiss"],ctx:"ai-triage-new-discoveries runs at 4:30 AM to analyze discovery monitoring results.",imp:"high",hint:"Auto-dismissal reduces noise but risks missing genuine regulatory changes."},
  {id:"adv-15",cat:"intelligence",q:"Should the system learn from which compliance entries users complete vs ignore?",type:"yes_no",ctx:"Users complete or hide entries but the system does not track patterns to improve future entries.",imp:"high",hint:"If yes, entries that are consistently hidden or ignored suggest they may be low-value."},
  {id:"adv-16",cat:"intelligence",q:"Should the compliance reasoning agent provide citations from the regulatory text?",type:"yes_no",ctx:"ComplianceReasoningAgent generates reasoning but citation to specific regulatory articles is not guaranteed.",imp:"critical",hint:"If yes, every compliance assessment should reference the specific regulatory article that applies."},
  {id:"adv-17",cat:"intelligence",q:"Should AI-generated impact analyses be reviewed before being shared with the organization?",type:"single_choice",opts:["Auto-share immediately (current)","Queue for compliance manager review","Auto-share with 'AI-generated' label","Auto-share LOW/MEDIUM, review HIGH/CRITICAL"],ctx:"Impact analyses are stored in the database immediately after generation.",imp:"high",hint:"AI-generated analyses may contain errors that could mislead compliance decisions."},
  {id:"adv-18",cat:"intelligence",q:"Should the monitor relevance re-evaluation (5:10 AM) be able to deactivate monitors that are no longer relevant?",type:"single_choice",opts:["Only flag for review","Auto-deactivate with low relevance","Reduce check frequency","Notify owner to review"],ctx:"re-evaluate-monitor-relevance runs at 5:10 AM to assess monitor relevance.",imp:"medium",hint:"Auto-deactivation risks missing regulatory changes; flagging is safer but creates work."},

  // ══════════════════════════════════════════════════════════════════════════
  // CHALLENGE — Additional questions (challenge-6 to challenge-20)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"challenge-6",cat:"challenge",q:"The system has 20+ scheduled tasks running between 1-9 AM. Is batch processing the right architecture, or should it be event-driven?",type:"single_choice",opts:["Batch is fine for compliance","Event-driven for critical items, batch for others","Fully event-driven","Hybrid with event-driven triggers and batch fallback"],ctx:"Celery beat schedule runs 20+ tasks sequentially from 1:00 AM to 9:30 AM UTC.",imp:"critical",hint:"Event-driven ensures immediate reaction to changes; batch is simpler but introduces latency."},
  {id:"challenge-7",cat:"challenge",q:"Is the current approach of one compliance map per organization sufficient, or should it support multiple views?",type:"single_choice",opts:["One map per org is sufficient","Multiple maps per product category","Multiple maps per regulation type","Custom map configurations per user"],ctx:"One global compliance map view per organization.",imp:"high",hint:"Large organizations may need separate compliance maps for different product lines or teams."},
  {id:"challenge-8",cat:"challenge",q:"Should the system support 'what-if' analysis (e.g., 'what happens to compliance if we add US-CA as target market')?",type:"yes_no",ctx:"No scenario planning or what-if analysis capability exists.",imp:"high",hint:"If yes, simulate compliance impact of market expansion or product changes before committing."},
  {id:"challenge-9",cat:"challenge",q:"Is the checksum-based dedup missing semantically duplicate entries (same issue, different wording)?",type:"single_choice",opts:["Checksum dedup is sufficient","Need semantic similarity matching","Need AI-based duplicate detection","Acceptable trade-off for simplicity"],ctx:"SHA-256 checksum of headline + entity IDs catches identical but not semantically similar entries.",imp:"high",hint:"'Certificate Expired: CE-12345' and 'CE Certificate CE-12345 has expired' are different checksums."},
  {id:"challenge-10",cat:"challenge",q:"Should the system support workflow automation (e.g., 'when certificate expires, auto-create renewal task, assign to John')?",type:"yes_no",ctx:"Entry creation and notification are automated but task creation and assignment are manual.",imp:"critical",hint:"If yes, implement configurable workflow rules linking compliance events to automated actions."},
  {id:"challenge-11",cat:"challenge",q:"Is the current 4-level severity model (INFO/TASK/WARNING/CRITICAL) sufficient, or should there be more levels?",type:"single_choice",opts:["4 levels is sufficient","Add URGENT between WARNING and CRITICAL","Add LOW below INFO","6 levels: LOW/INFO/TASK/WARNING/URGENT/CRITICAL"],ctx:"EntryType: INFO(150), TASK(250), WARNING(350), CRITICAL(450) — 4 levels.",imp:"high",hint:"More levels enable finer prioritization; fewer levels are simpler to understand."},
  {id:"challenge-12",cat:"challenge",q:"Should the system support regulatory change impact simulation across the entire product portfolio?",type:"yes_no",ctx:"Impact analysis is per-regulation-change. No portfolio-wide simulation.",imp:"high",hint:"If yes, simulate 'if EU MDR is updated, how does it affect all our medical devices across all markets?'"},
  {id:"challenge-13",cat:"challenge",q:"Is the additive-only approach for hub document sync correct, or should deletions be synced?",type:"single_choice",opts:["Additive-only is correct (current)","Sync deletions as soft-delete","Sync deletions with confirmation","Depends on document type"],ctx:"Hub document sync never deletes. Orphaned documents remain.",imp:"medium",hint:"Orphaned hub documents with deleted source records create confusion in document management."},
  {id:"challenge-14",cat:"challenge",q:"Should the system have a 'compliance confidence score' that combines multiple data signals?",type:"yes_no",ctx:"No unified confidence score exists. Compliance is binary per entry (compliant or not).",imp:"high",hint:"If yes, combine entry severity, certificate coverage, assessment freshness, and monitoring coverage into one score."},
  {id:"challenge-15",cat:"challenge",q:"Is the current organization-scoped architecture sufficient, or should it support cross-organization collaboration?",type:"single_choice",opts:["Organization scope is sufficient","Support supply chain collaboration","Support notified body access","Support regulatory authority access"],ctx:"All data is strictly organization-scoped with no cross-org sharing.",imp:"high",hint:"Supply chain compliance often requires sharing data between manufacturers and suppliers."},

  // ══════════════════════════════════════════════════════════════════════════
  // STRATEGY — Additional questions (biz-7 to biz-25)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"biz-7",cat:"strategy",q:"Should the system provide benchmarking against industry peers (anonymized compliance posture comparison)?",type:"yes_no",ctx:"No benchmarking or peer comparison feature exists.",imp:"high",hint:"If yes, anonymized benchmarking helps organizations understand how they compare to industry standards."},
  {id:"biz-8",cat:"strategy",q:"Should ProductLex offer a 'compliance readiness assessment' for organizations evaluating the platform?",type:"yes_no",ctx:"No pre-purchase assessment or onboarding compliance health check exists.",imp:"medium",hint:"If yes, an initial assessment demonstrates immediate value and identifies quick wins."},
  {id:"biz-9",cat:"strategy",q:"Should the system track and visualize the cost of compliance over time?",type:"yes_no",ctx:"Impact analyses estimate costs but no historical cost tracking or visualization exists.",imp:"high",hint:"If yes, show total compliance spend trends to demonstrate ROI and identify cost optimization opportunities."},
  {id:"biz-10",cat:"strategy",q:"Should the system recommend optimal notified body/testing lab selection based on product type and market?",type:"yes_no",ctx:"No notified body or testing lab recommendation engine exists.",imp:"high",hint:"If yes, build a database of notified bodies with specializations, fees, and processing times."},
  {id:"biz-11",cat:"strategy",q:"Should the system support compliance project management (Gantt charts, milestones, resource allocation)?",type:"yes_no",ctx:"V2 Task system exists but no project management visualization (Gantt, milestones).",imp:"medium",hint:"If yes, integrate compliance tasks with project management views for certification projects."},
  {id:"biz-12",cat:"strategy",q:"Should the system offer a compliance training module for organization staff?",type:"yes_no",ctx:"Training cost is estimated in impact analyses but no training delivery capability exists.",imp:"medium",hint:"If yes, provide regulation-specific training content and track completion for audit purposes."},
  {id:"biz-13",cat:"strategy",q:"Should the system generate 'compliance certificates' or attestations that organizations can share with customers?",type:"yes_no",ctx:"No customer-facing compliance documentation generation exists.",imp:"high",hint:"If yes, generate shareable compliance summaries that customers or partners can verify."},
  {id:"biz-14",cat:"strategy",q:"Should the system support 'compliance as a service' for small organizations without dedicated compliance staff?",type:"yes_no",ctx:"System assumes organizations have compliance knowledge. No guided workflow for novices.",imp:"high",hint:"If yes, provide step-by-step guided compliance workflows with plain-language explanations."},
  {id:"biz-15",cat:"strategy",q:"Should the platform offer an API for third-party integrations (e.g., e-commerce platforms checking compliance before listing)?",type:"yes_no",ctx:"Backend has API endpoints but no public API documentation or third-party integration framework.",imp:"high",hint:"If yes, enable marketplace integrations where compliance status is checked before product listing."},
  {id:"biz-16",cat:"strategy",q:"Should the system track competitor product recalls and regulatory actions as intelligence?",type:"yes_no",ctx:"CPSC recalls and EU Safety Gate monitoring exists but is not positioned as competitive intelligence.",imp:"medium",hint:"If yes, frame recall monitoring as competitive intelligence — competitor recalls may affect your market."},
  {id:"biz-17",cat:"strategy",q:"Should the system calculate market entry feasibility scores based on current compliance posture?",type:"yes_no",ctx:"No automated market entry analysis exists.",imp:"high",hint:"If yes, show 'Your product is 80% ready for EU, 30% ready for Japan' based on existing compliance data."},
  {id:"biz-18",cat:"strategy",q:"Should the system support multi-language UI for international compliance teams?",type:"yes_no",ctx:"The application is English-only. International compliance teams may prefer their local language.",imp:"medium",hint:"If yes, implement i18n for at least EN, DE, FR, ES, JA, ZH to serve major markets."},
  {id:"biz-19",cat:"strategy",q:"Should the system offer compliance insurance integration (linking compliance status to insurance premiums)?",type:"yes_no",ctx:"No insurance or liability tracking integration exists.",imp:"medium",hint:"If yes, partner with insurance providers to offer compliance-linked premium discounts."},
  // ══════════════════════════════════════════════════════════════════════════
  // MODEL ANALYSIS — Backend model constraints, defaults, cascade behavior
  // ══════════════════════════════════════════════════════════════════════════
  {id:"model-1",cat:"compliance_status",q:"Compliance status uses 50% as the threshold between PARTIAL and NON_COMPLIANT. Should a product at exactly 49% compliance be classified as non-compliant, or should the threshold be lower (e.g., 30%)?",type:"single_choice",opts:["50% is correct","40% threshold","30% threshold","25% threshold"],ctx:"ComplianceStatus.calculate_status_from_score(): score >= 50.0 → PARTIAL, else NON_COMPLIANT",imp:"critical",hint:"Lowering the threshold means more products appear 'partially compliant' instead of 'non-compliant', which affects dashboard urgency signals"},
  {id:"model-2",cat:"certificates",q:"When a product is deleted, all its certificates are cascade-deleted. Should certificates be preserved as historical compliance records even after the product is removed?",type:"yes_no",ctx:"Certificate.product_id has ondelete='CASCADE' — deleting a product deletes all its certificates",imp:"critical",hint:"If yes, the FK should use SET NULL instead of CASCADE to preserve certificate audit trail"},
  {id:"model-3",cat:"compliance_status",q:"The ComplianceEntry severity levels use numeric values INFO=150, TASK=250, WARNING=350, CRITICAL=450. Are these severity gaps (100 points between each) correct, or should there be room for additional severity levels between them?",type:"yes_no",ctx:"EntryType severity values: INFO=150, TASK=250, WARNING=350, CRITICAL=450 with 100-point gaps",imp:"high",hint:"If additional levels are needed later, the 100-point gaps allow insertion without breaking existing ordering"},
  {id:"model-4",cat:"certificates",q:"Certificate status has 5 values: valid, expired, revoked, pending, suspended. Is 'suspended' (temporarily invalid) a necessary distinction from 'revoked' (permanently invalid) for your compliance workflows?",type:"yes_no",ctx:"CertificateStatus enum: VALID, EXPIRED, REVOKED, PENDING, SUSPENDED",imp:"medium",hint:"If not needed, removing 'suspended' simplifies certificate lifecycle tracking"},
  {id:"model-5",cat:"products",q:"Product status is a free-text String(50) field defaulting to 'draft'. Should this be a constrained enum instead to prevent typos and inconsistencies (e.g., 'Draft' vs 'draft' vs 'DRAFT')?",type:"yes_no",ctx:"Product.status = String(50), default='draft' — accepts any string value like 'draft', 'active', 'archived', 'discontinued'",imp:"high",hint:"Converting to an enum prevents invalid status values but requires a migration for existing data"},
  {id:"model-6",cat:"products",q:"The product category enum lists 16 categories including AEROSPACE, AUTOMOTIVE, and TELECOM. Are all 16 categories actively used by customers, or should unused categories be removed to simplify the UI?",type:"single_choice",opts:["All 16 are needed","Remove unused ones","Add more categories","Replace with free text"],ctx:"ProductCategory: MEDICAL_DEVICE, PHARMACEUTICAL, COSMETIC, FOOD, CHEMICAL, ELECTRONIC, TOY, TEXTILE, MACHINERY, BUILDING_MATERIAL, AUTOMOTIVE, AEROSPACE, ENERGY, ENVIRONMENTAL, TELECOM, OTHER",imp:"medium",hint:"Fewer categories means simpler dropdowns but may force users to select 'OTHER' too often"},
  {id:"model-7",cat:"regulations",q:"Requirement severity defaults to MEDIUM. Should new requirements default to HIGH instead, to ensure compliance officers review them before downgrading?",type:"single_choice",opts:["MEDIUM default is correct","Default to HIGH","Default to CRITICAL","No default - force selection"],ctx:"Requirement.severity default=RequirementSeverity.MEDIUM",imp:"high",hint:"A higher default ensures nothing slips through, but creates more noise for compliance officers"},
  {id:"model-8",cat:"regulations",q:"Requirement status starts as DRAFT and has 9 possible values. Are all 9 states needed, or could PARTIALLY_COMPLIANT and UNDER_REVIEW be merged into IN_PROGRESS?",type:"yes_no",ctx:"RequirementStatus: DRAFT, ACTIVE, IN_PROGRESS, COMPLIANT, NON_COMPLIANT, PARTIALLY_COMPLIANT, NOT_APPLICABLE, UNDER_REVIEW, ARCHIVED",imp:"medium",hint:"Fewer states simplify the workflow but reduce tracking granularity"},
  {id:"model-9",cat:"risk",q:"The ComplianceImpactAnalysis model marks costs above $10,000 as 'expensive' (is_expensive property). Is $10,000 the right threshold for flagging expensive compliance actions?",type:"single_choice",opts:["$10,000 is correct","$5,000 threshold","$25,000 threshold","$50,000 threshold","Make it configurable per org"],ctx:"ComplianceImpactAnalysis.is_expensive: self.estimated_cost >= Decimal('10000')",imp:"medium",hint:"The threshold determines which items get flagged in budget dashboards; too low creates noise, too high misses important costs"},
  {id:"model-10",cat:"risk",q:"Impact analysis risk levels include 'negligible' in addition to low/medium/high/critical. Is 'negligible' a useful distinction from 'low', or does it add unnecessary complexity?",type:"yes_no",ctx:"risk_level CHECK: 'critical', 'high', 'medium', 'low', 'negligible'",imp:"medium",hint:"Removing 'negligible' simplifies filtering but loses the ability to deprioritize truly trivial items"},
  {id:"model-11",cat:"monitoring",q:"Regulatory monitors default to 'daily' check frequency. For fast-changing sources like FDA recalls, should the default be 'hourly' instead?",type:"single_choice",opts:["Daily is correct default","Hourly default","Weekly default","Source-type dependent"],ctx:"RegulatoryMonitor.frequency default='daily', options: hourly, daily, weekly, monthly",imp:"high",hint:"More frequent checks catch changes faster but increase API costs and server load"},
  {id:"model-12",cat:"monitoring",q:"Monitor status has 4 values: active, paused, error, disabled. Is 'paused' (user-initiated stop) different enough from 'disabled' (system-initiated stop) to justify two separate states?",type:"yes_no",ctx:"MonitorStatus: ACTIVE, PAUSED, ERROR, DISABLED",imp:"medium",hint:"If merged, you lose the ability to distinguish user-paused from system-disabled monitors"},
  {id:"model-13",cat:"notifications",q:"Notification priority defaults to MEDIUM. Should compliance entry notifications (COMPLIANCE_ENTRY_CRITICAL) always default to URGENT instead?",type:"yes_no",ctx:"Notification.priority default=NotificationPriority.MEDIUM — applies to all notification types including critical compliance entries",imp:"high",hint:"If yes, critical compliance events will always appear at the top of notification lists"},
  {id:"model-14",cat:"general",q:"Organization plan defaults to 'free' with max_users=5. Is 5 users sufficient for a free tier, or should it be lower (3) or higher (10)?",type:"single_choice",opts:["5 is correct","3 users","10 users","1 user"],ctx:"Organization: plan default='free', max_users default=5",imp:"medium",hint:"Affects conversion rate: too generous reduces upgrade motivation, too restrictive prevents adoption"},
  {id:"model-15",cat:"general",q:"Organizations have 4 tiers: free, starter, professional, enterprise. Is 'starter' a necessary tier between free and professional?",type:"yes_no",ctx:"OrganizationTier: FREE, STARTER, PROFESSIONAL, ENTERPRISE",imp:"medium",hint:"Fewer tiers simplify pricing but may create too large a jump between free and professional"},
  {id:"model-16",cat:"documents",q:"Hub documents default to 90 days renewal_lead_days for expiry warnings. Is 90 days appropriate for all document types, or should certificates get longer lead times (e.g., 180 days)?",type:"single_choice",opts:["90 days for all","180 days for certificates","60 days for all","Make it type-dependent"],ctx:"HubDocument.renewal_lead_days default=90 — applies uniformly to all document types",imp:"high",hint:"Certificate renewals often require testing lab scheduling (3-6 months), so 90 days may be too short"},
  {id:"model-17",cat:"certificates",q:"The Certificate model has auto_update_on_completion defaulting to True. Should auto-updating certificate status when linked tasks complete be opt-in (default False) instead?",type:"yes_no",ctx:"Certificate.auto_update_on_completion default=True — automatically updates certificate status when all linked tasks complete",imp:"high",hint:"Auto-update saves time but could prematurely mark certificates as ready before manual verification"},
  {id:"model-18",cat:"products",q:"Product hierarchy has 5 levels: project, system, assembly, component, material. New products default to 'component'. Is this the right default for most users?",type:"single_choice",opts:["component is correct","product (no hierarchy)","assembly","project"],ctx:"Product.product_type default='component', hierarchy_level 0-4",imp:"medium",hint:"If most users add standalone products rather than BOM components, 'product' or no default might be better"},
  {id:"model-19",cat:"compliance_status",q:"ComplianceEntry headline is limited to String(255). Is 255 characters sufficient for compliance issue titles, or do compliance officers need more space?",type:"single_choice",opts:["255 is sufficient","500 characters","1000 characters","Unlimited (Text)"],ctx:"ComplianceEntry.headline = String(255), nullable=False",imp:"medium",hint:"Longer titles provide more context at a glance but make list views harder to scan"},
  {id:"model-20",cat:"compliance_status",q:"ComplianceEntry country field is String(10). This accommodates ISO alpha-2 (2 chars) and alpha-3 (3 chars) codes. Should it be constrained to exactly 2 characters to enforce ISO 3166-1 alpha-2?",type:"yes_no",ctx:"ComplianceEntry.country = String(10) — currently accepts any string up to 10 chars",imp:"medium",hint:"Constraining to 2 chars prevents data inconsistency but blocks regional codes like 'EU'"},
  {id:"model-21",cat:"regulations",q:"Regulation code is String(100). Some regulation codes can be very long (e.g., 'FDA-21-CFR-820-SUBPART-C'). Is 100 characters sufficient?",type:"yes_no",ctx:"Regulation.code = String(100) — e.g., 'EU-MDR-2017-745', 'FDA-21-CFR-820'",imp:"medium",hint:"If codes are truncated, lookup and deduplication logic may fail"},
  {id:"model-22",cat:"regulations",q:"RegulationUpdate impact_level defaults to 'medium'. Should detected regulation updates default to 'high' to ensure they get immediate attention?",type:"single_choice",opts:["medium is correct","high default","critical default","No default - AI must set it"],ctx:"RegulationUpdate.impact_level default='medium'",imp:"high",hint:"Higher defaults ensure nothing is missed but may cause alert fatigue if most updates are routine"},
  {id:"model-23",cat:"compliance_status",q:"ComplianceEntry source defaults to 'system'. Current options are 'system', 'user', 'celery_task'. Should there be a formal enum instead of a free-text String(50)?",type:"yes_no",ctx:"ComplianceEntry.source = String(50), default='system'",imp:"medium",hint:"An enum prevents typos but makes adding new source types require a migration"},
  {id:"model-24",cat:"certificates",q:"Certificate expiry is checked with a hardcoded 30-day default in is_expiring_soon(). Should this threshold be configurable per organization?",type:"yes_no",ctx:"Certificate.is_expiring_soon(days=30) — fixed default, but accepts parameter",imp:"high",hint:"Some certificates (e.g., medical devices) need 6-month advance warning, while others need only 2 weeks"},
  {id:"model-25",cat:"monitoring",q:"The circuit breaker for regulatory monitors is implemented but has no configurable max backoff time. Should there be a maximum circuit-open duration (e.g., 7 days)?",type:"yes_no",ctx:"RegulatoryMonitor.circuit_breaker_until — exponential backoff with no documented ceiling",imp:"high",hint:"Without a max, a monitor could be circuit-broken for months if errors compound"},
  {id:"model-26",cat:"general",q:"User roles are ADMIN, COMPLIANCE_OFFICER, PRODUCT_MANAGER, VIEWER. Is there a need for a SUPERADMIN role above ADMIN for platform-level operations?",type:"yes_no",ctx:"UserRole: ADMIN, COMPLIANCE_OFFICER, PRODUCT_MANAGER, VIEWER — plus is_superuser boolean on User",imp:"medium",hint:"is_superuser exists as a boolean but is not a formal role; a formal SUPERADMIN role would be more explicit"},
  {id:"model-27",cat:"general",q:"UserOrganization defaults new members to VIEWER role. Should new team members default to COMPLIANCE_OFFICER or PRODUCT_MANAGER instead for faster onboarding?",type:"single_choice",opts:["VIEWER is correct","COMPLIANCE_OFFICER","PRODUCT_MANAGER","No default - force selection"],ctx:"UserOrganization.role default=UserRole.VIEWER",imp:"medium",hint:"VIEWER is the most restrictive (safest) default but may slow down onboarding"},
  {id:"model-28",cat:"regulations",q:"The Requirement model has both regulation_id and legal_act_id as nullable FKs. Should at least one be required (CHECK constraint) to prevent orphan requirements?",type:"yes_no",ctx:"Requirement: regulation_id nullable=True, legal_act_id nullable=True — both can be NULL simultaneously",imp:"high",hint:"Orphan requirements with no parent regulation/legal act are effectively undiscoverable"},
  {id:"model-29",cat:"impact_analysis",q:"ComplianceImpactAnalysis stores estimated_cost as Numeric(12,2) — max $9,999,999,999.99. Is this range sufficient for large-scale compliance costs?",type:"yes_no",ctx:"estimated_cost = Numeric(12, 2) — supports up to ~$10 billion",imp:"medium",hint:"For multi-national compliance programs, costs could theoretically exceed this, but it covers 99.9% of cases"},
  {id:"model-30",cat:"impact_analysis",q:"Priority score calculation gives 'critical' risk a base score of 100 and adds up to 10 more points for high costs. Should cost impact have a larger weight in the priority formula?",type:"yes_no",ctx:"priority_score: critical=100, high=75, medium=50, low=25, negligible=10. Cost >= $50k adds 10pts, >= $10k adds 5pts",imp:"medium",hint:"Higher cost weighting would prioritize expensive compliance items even if risk level is medium"},
  {id:"model-31",cat:"regulations",q:"RegulationChange change_type allows 5 values: amendment, new_version, repeal, effective_date_change, scope_change. Is 'scope_change' distinct enough from 'amendment' to warrant its own category?",type:"yes_no",ctx:"CHECK constraint: change_type IN ('amendment', 'new_version', 'repeal', 'effective_date_change', 'scope_change')",imp:"medium",hint:"Scope changes specifically alter which products/markets are covered, which has different impact than content amendments"},
  {id:"model-32",cat:"regulations",q:"StandardChange has different change_types than RegulationChange — it includes 'withdrawal', 'new_edition', 'corrigendum' but NOT 'effective_date_change' or 'scope_change'. Should they be aligned?",type:"yes_no",ctx:"StandardChange: 'amendment', 'new_version', 'withdrawal', 'new_edition', 'corrigendum'. RegulationChange: 'amendment', 'new_version', 'repeal', 'effective_date_change', 'scope_change'",imp:"high",hint:"Aligned types simplify cross-referencing and unified dashboards, but standards and regulations genuinely have different lifecycle events"},
  {id:"model-33",cat:"compliance_status",q:"ComplianceEntry dedup checksum is a unique constraint scoped to organization_id. But completed entries (completed_at != NULL) bypass dedup. Should completed entries also be deduplicated?",type:"yes_no",ctx:"UniqueConstraint('organization_id', 'checksum') — but service code only checks incomplete entries",imp:"high",hint:"If yes, you prevent re-creating the same issue after resolution; if no, a recurring problem can be tracked multiple times"},
  {id:"model-34",cat:"products",q:"Product EAN field is globally unique (unique=True). Should uniqueness be scoped to organization instead, since different organizations might track the same product?",type:"yes_no",ctx:"Product.ean = String(14), unique=True — prevents any two products in the entire system from sharing an EAN",imp:"critical",hint:"Global uniqueness means two organizations cannot both add the same physical product by EAN"},
  {id:"model-35",cat:"documents",q:"HubDocument classification defaults to 'internal'. Should compliance-critical documents like certificates default to 'confidential' instead?",type:"single_choice",opts:["internal is correct","confidential for certificates","restricted for all","No default - force selection"],ctx:"HubDocument.classification default='internal' — options: public, internal, confidential, restricted",imp:"medium",hint:"Defaulting to 'internal' is safe but may under-classify sensitive compliance documents"},
  {id:"model-36",cat:"documents",q:"HubDocument version defaults to '1.0'. Should the system enforce semantic versioning (major.minor.patch) or allow free-form version strings?",type:"single_choice",opts:["Free-form is fine","Enforce semantic versioning","Integer-only versions","Date-based versions"],ctx:"HubDocument.version default='1.0' — String(50), accepts any string",imp:"medium",hint:"Semantic versioning enables automated version comparison, but some documents use date-based versioning"},
  {id:"model-37",cat:"monitoring",q:"RegulatoryMonitor relevance_score uses 0.8 as the auto-promotion threshold and 0.5 as the human-review threshold. Are these thresholds appropriate?",type:"yes_no",ctx:"relevance_score 0.0-1.0: >0.8 auto-promote to active tier, 0.5-0.8 requires human review, <0.5 stays discovery",imp:"high",hint:"Lower auto-promotion threshold catches more relevant sources but increases false positives"},
  {id:"model-38",cat:"general",q:"User account lockout has no configurable maximum failed attempts — it uses a hardcoded counter. Should there be a configurable lockout threshold (e.g., 5 attempts)?",type:"yes_no",ctx:"User.failed_login_attempts = Integer, default=0 — no CHECK constraint on max attempts",imp:"high",hint:"A configurable threshold lets security-sensitive organizations enforce stricter policies"},
  {id:"model-39",cat:"notifications",q:"NotificationType still includes ROADMAP_MILESTONE even though V1 roadmap system was completely removed. Should this enum value be removed?",type:"yes_no",ctx:"NotificationType.ROADMAP_MILESTONE = 'ROADMAP_MILESTONE' — V1 roadmap tables were dropped in commit b776d66e",imp:"medium",hint:"Removing it prevents confusion but may break existing notification records that reference this type"},
  {id:"model-40",cat:"compliance_status",q:"ComplianceEntry allows both product_id (single product) and product_ids JSON array (multiple products) simultaneously. Should there be a CHECK constraint ensuring they are mutually exclusive?",type:"yes_no",ctx:"product_id = FK nullable, product_ids = JSON nullable — get_all_product_ids() merges both into a single list",imp:"medium",hint:"Allowing both is flexible but means the same product could appear in both fields, causing double-counting"},
  {id:"model-41",cat:"regulations",q:"Regulation.confidence_score is defined as Float type but stored in a String(10) column. This appears to be a bug — should it be an actual Float column?",type:"yes_no",ctx:"Requirement.confidence_score: Mapped[Optional[float]] = mapped_column(String(10)) — type annotation says float but column is String",imp:"critical",hint:"This type mismatch means AI confidence scores are stored as strings, breaking numeric comparisons and sorting"},
  {id:"model-42",cat:"intelligence",q:"PredictiveRegulation uses 0.75 as the 'high confidence' threshold for predictions. Should this threshold be higher (0.85) to reduce false positives in compliance planning?",type:"single_choice",opts:["0.75 is correct","0.80 threshold","0.85 threshold","0.90 threshold"],ctx:"PredictiveRegulation.is_high_confidence: self.prediction_confidence >= 0.75",imp:"high",hint:"Higher threshold means fewer but more reliable predictions; lower threshold means more coverage but more noise"},
  {id:"model-43",cat:"intelligence",q:"PredictiveRegulation defines 'near effective' as within 180 days (6 months). Is 6 months the right planning horizon, or should it be longer (12 months) for compliance preparation?",type:"single_choice",opts:["6 months is correct","3 months","9 months","12 months"],ctx:"is_near_effective: predicted_effective_date <= today + 180 days",imp:"high",hint:"Longer horizon gives more preparation time but may surface too many distant, uncertain predictions"},
  {id:"model-44",cat:"products",q:"Product.co2_emissions uses Numeric(10,4) — max 999,999.9999 grams. For large industrial products, emissions could exceed 1 million grams per unit. Is this range sufficient?",type:"yes_no",ctx:"co2_emissions = Numeric(10, 4) — CO2 equivalent emissions in grams per unit (g CO2e/unit)",imp:"medium",hint:"Industrial machinery could have emissions in tons (millions of grams), exceeding the current column range"},
  {id:"model-45",cat:"compliance_status",q:"ComplianceEntry has no severity escalation mechanism. Should entries auto-escalate from INFO to WARNING if unresolved after a configurable period?",type:"yes_no",ctx:"ComplianceEntry entry_type is set at creation and only changed by DynamicPriorityAgent re-evaluation at 5:00 AM",imp:"high",hint:"Auto-escalation ensures old issues get attention but may create false urgency for low-impact items"},
  {id:"model-46",cat:"general",q:"Organization.manufacturer_country uses String(2) for ISO country codes, but some properties elsewhere use String(3) or String(10). Should country code length be standardized across all models?",type:"yes_no",ctx:"Organization.manufacturer_country = String(2), ComplianceEntry.country = String(10), Regulation.source_country = String(3)",imp:"medium",hint:"Inconsistent country code lengths can cause data quality issues when joining or comparing across tables"},
  {id:"model-47",cat:"documents",q:"HubDocumentRenewal has 4 escalation levels (0=none, 1=reminder, 2=manager, 3=director). Is 'director' the highest level needed, or should there be a 4th level (e.g., executive/board)?",type:"yes_no",ctx:"HubDocumentRenewal.escalation_level default=0, max=3 (director)",imp:"medium",hint:"Adding more levels increases accountability but adds complexity to the escalation workflow"},
  {id:"model-48",cat:"compliance_status",q:"ComplianceEntry completed_by uses ondelete='SET NULL'. This means if a user is deleted, the completion attribution is lost. Should user deletion be blocked if they have completed entries?",type:"yes_no",ctx:"ComplianceEntry.completed_by FK to users.id, ondelete='SET NULL'",imp:"medium",hint:"Blocking user deletion preserves audit trail but makes user offboarding more complex"},
  {id:"model-49",cat:"monitoring",q:"MonitorSourceType has 29 source types. Some (like JAPAN_PMDA, KOREA_MFDS, INDIA_CDSCO) are highly region-specific. Should source types be extensible (free text + suggested list) instead of a fixed enum?",type:"yes_no",ctx:"MonitorSourceType: 29 values covering EU, US, UK, Canada, APAC, Latin America, South Asia sources",imp:"medium",hint:"Extensible sources allow users to add new regulatory bodies without code changes"},
  {id:"model-50",cat:"regulations",q:"RegulationCitation.citation_type accepts 5 values as free text: reference, amendment, repeal, supersede, related. Should this be a formal enum to prevent data quality issues?",type:"yes_no",ctx:"RegulationCitation.citation_type = String(50), default='reference'",imp:"medium",hint:"An enum ensures consistent values but requires code changes to add new citation types"},
  {id:"model-51",cat:"general",q:"ExternalUser access tokens have a fixed expiration (token_expires_at). Should there be a maximum token lifetime enforced by the system (e.g., 90 days)?",type:"single_choice",opts:["No maximum needed","30 days max","90 days max","180 days max","365 days max"],ctx:"ExternalUser.token_expires_at = DateTime — set by inviting user, no system-enforced maximum",imp:"high",hint:"Long-lived tokens increase security risk; short lifetimes require frequent re-invitation"},
  {id:"model-52",cat:"compliance_status",q:"ComplianceEntry action_url is String(500). Some frontend routes with query parameters can be very long. Should this be increased to 2000 characters?",type:"yes_no",ctx:"ComplianceEntry.action_url = String(500)",imp:"medium",hint:"URL truncation at 500 chars could break deep links with complex filter parameters"},
  {id:"model-53",cat:"products",q:"Product.compliance_status is a free-text String(50) field separate from the ComplianceEntry/ComplianceStatus system. Should this redundant field be removed to avoid conflicting compliance data?",type:"yes_no",ctx:"Product.compliance_status = String(50) — 'compliant', 'non_compliant', 'in_review', 'unknown'. But ComplianceEntry is the source of truth for compliance status.",imp:"high",hint:"Having two sources of truth for compliance status (Product.compliance_status and ComplianceEntry) creates confusion"},
  {id:"model-54",cat:"regulations",q:"Regulation has both official_url and source_url fields. Should these be consolidated into a single field to avoid confusion about which URL to use?",type:"yes_no",ctx:"Regulation: official_url = String(500), source_url = String(500) — two separate URL fields",imp:"medium",hint:"official_url is the published regulation, source_url is where the system scraped it from — they serve different purposes"},
  {id:"model-55",cat:"general",q:"Organization branding_primary_color is String(7) for hex colors (#RRGGBB). Should it support alpha transparency (#RRGGBBAA, 9 characters)?",type:"yes_no",ctx:"Organization.branding_primary_color = String(7) — hex format like '#3B82F6'",imp:"medium",hint:"Alpha transparency is rarely needed for brand colors, and supporting it adds UI complexity"},
  {id:"model-56",cat:"certificates",q:"Certificate.cert_metadata defaults to an empty dict using a mutable default (default={}). This is a known Python antipattern — should it use default=dict instead?",type:"yes_no",ctx:"Certificate.cert_metadata = Column(JSON, default={}) — mutable default dict shared across all instances",imp:"critical",hint:"Mutable default arguments in Python are shared across instances, which could cause data corruption"},
  {id:"model-57",cat:"regulations",q:"The Regulation model stores full_text as Text (unlimited). For very large regulations (e.g., EU MDR at 175 pages), should there be a size limit or should full text be stored in object storage instead?",type:"yes_no",ctx:"Regulation.full_text = Text, nullable=True — stores entire regulation text in the database",imp:"medium",hint:"Large text blobs in the database increase backup size and query latency, but simplify full-text search"},
  {id:"model-58",cat:"compliance_status",q:"ComplianceStatus review_frequency_days has no default. Should organizations be prompted to set a review frequency, or should there be a default (e.g., 90 days)?",type:"single_choice",opts:["No default is correct","30 days default","90 days default","180 days default","365 days default"],ctx:"ComplianceStatus.review_frequency_days = Integer, nullable=True — no default, no enforcement",imp:"high",hint:"Without a default, compliance statuses may never be scheduled for review, leading to stale data"},
  {id:"model-59",cat:"documents",q:"DocumentComplianceCheck uses a traffic-light system where GREEN >= 80%, YELLOW >= 40%, RED < 40%. Are these thresholds appropriate for compliance document validation?",type:"yes_no",ctx:"CheckResult.from_score: >= 80 → GREEN, >= 40 → YELLOW, < 40 → RED",imp:"high",hint:"A 40% threshold for YELLOW seems very permissive for compliance documents — a failed declaration at 45% would show as yellow, not red"},
  {id:"model-60",cat:"documents",q:"DocumentComplianceCheck product_category has only 5 options (LED lighting, small electronics, children's toys, personal care, general consumer). Should this be expanded to match the 16 ProductCategory values?",type:"yes_no",ctx:"ProductCategoryType: LED_LIGHTING, SMALL_ELECTRONICS, CHILDREN_TOYS, PERSONAL_CARE, GENERAL_CONSUMER",imp:"high",hint:"Misaligned categories means medical devices, machinery, and automotive products cannot be properly categorized in document checks"},
  {id:"model-61",cat:"compliance_status",q:"ComplianceStatusLevel includes EXEMPT. Should exempt products be tracked separately, or does EXEMPT effectively mean 'not applicable' (which already exists as NOT_ASSESSED)?",type:"yes_no",ctx:"ComplianceStatusLevel: COMPLIANT, NON_COMPLIANT, PARTIAL, PENDING, NOT_ASSESSED, EXEMPT",imp:"medium",hint:"EXEMPT indicates a deliberate decision that a regulation doesn't apply, while NOT_ASSESSED means it hasn't been evaluated yet"},
  {id:"model-62",cat:"general",q:"TaskSLAConfiguration defaults: CRITICAL=24h, HIGH=72h, MEDIUM=168h (7 days), LOW=336h (14 days). Are these SLA windows appropriate for compliance tasks?",type:"yes_no",ctx:"TaskSLAConfiguration: critical_hours=24, high_hours=72, medium_hours=168, low_hours=336",imp:"high",hint:"For regulated industries, 24 hours for critical issues may be too tight, while 14 days for low priority may be too generous"},
  {id:"model-63",cat:"general",q:"SLA warning fires at 75% of the SLA window (e.g., 18 hours into a 24-hour SLA). Should the warning threshold be earlier (e.g., 50%) to give more response time?",type:"single_choice",opts:["75% is correct","50% threshold","60% threshold","Make it per-priority"],ctx:"TaskSLAConfiguration.warning_threshold_percent default=75",imp:"medium",hint:"Earlier warnings give more buffer time but may create unnecessary urgency for tasks that are on track"},
  {id:"model-64",cat:"regulations",q:"LegalAct.processing_status defaults to 'PENDING' (uppercase) while most other status fields use lowercase values. Should this be normalized to lowercase?",type:"yes_no",ctx:"LegalAct.processing_status default='PENDING' — but RegulationChange uses lowercase 'low', 'medium', etc.",imp:"medium",hint:"Inconsistent casing can cause bugs when comparing or filtering across models"},
  {id:"model-65",cat:"regulations",q:"ConditionalRequirement has 3 values: NEVER, CONDITIONAL, ALWAYS. Is NEVER (requirement never applies) different enough from simply not linking the requirement to the legal act?",type:"yes_no",ctx:"ConditionalRequirement: NEVER='never', CONDITIONAL='conditional', ALWAYS='always' — for EU legal act requirements",imp:"medium",hint:"NEVER explicitly documents that a requirement was evaluated and determined not to apply, which is different from never evaluating it"},
  {id:"model-66",cat:"products",q:"ProductComponent.quantity defaults to 1 and is typed as Integer. Should it support fractional quantities (e.g., 0.5 kg of material) by using Float?",type:"yes_no",ctx:"ProductComponent.quantity = Integer, default=1 — always whole numbers",imp:"medium",hint:"Bill of Materials often requires fractional quantities for materials and chemicals"},
  {id:"model-67",cat:"general",q:"Task.headline is limited to String(200). Some compliance tasks have long titles describing the regulation and action. Should this be increased?",type:"single_choice",opts:["200 is sufficient","300 characters","500 characters","Unlimited (Text)"],ctx:"Task.headline = String(200), nullable=False",imp:"medium",hint:"Truncated task titles reduce clarity in task lists and notifications"},
  {id:"model-68",cat:"monitoring",q:"Webhook max_failures defaults to 10 before auto-disable. Is 10 consecutive failures the right threshold, or should it be lower (5) to fail faster?",type:"single_choice",opts:["10 is correct","5 failures","3 failures","15 failures","Make configurable"],ctx:"Webhook.max_failures default=10 — auto-disables webhook after 10 consecutive delivery failures",imp:"medium",hint:"More failures means more tolerance for transient issues but delays detection of permanently broken endpoints"},
  {id:"model-69",cat:"monitoring",q:"WebhookDelivery allows up to 5 retry attempts with exponential backoff (1min, 5min, 30min, 2hr, 24hr). Is the final 24-hour retry too long?",type:"yes_no",ctx:"WebhookDelivery.max_attempts default=5, delays: [60, 300, 1800, 7200, 86400] seconds",imp:"medium",hint:"24-hour retry ensures delivery of time-sensitive compliance events but the data may be stale by then"},
  {id:"model-70",cat:"monitoring",q:"Webhook rate_limit_per_minute defaults to 60 requests/minute. For high-volume compliance event sources, should this be higher?",type:"single_choice",opts:["60/min is correct","30/min","120/min","300/min","No limit"],ctx:"Webhook.rate_limit_per_minute default=60",imp:"medium",hint:"Higher limits ensure all events are delivered promptly but may overwhelm consumer endpoints"},
  {id:"model-71",cat:"intelligence",q:"EU Legislative Proposal adoption_likelihood defaults to 0.5 (50%). Should new proposals start with a lower default (e.g., 0.3) since most legislative proposals are modified significantly?",type:"single_choice",opts:["0.5 is correct","0.3 default","0.7 default","No default - require AI assessment"],ctx:"EULegislativeProposal.adoption_likelihood default=0.5",imp:"medium",hint:"A 50% default may trigger unnecessary compliance preparation alerts for proposals that are unlikely to pass"},
  {id:"model-72",cat:"products",q:"Product cascade-deletes ALL test reports when the product is deleted. Should test reports be preserved for regulatory audit purposes?",type:"yes_no",ctx:"Product.test_reports cascade='all, delete-orphan' — deleting product deletes all test reports",imp:"critical",hint:"Regulators may require access to historical test reports even after a product is discontinued"},
  {id:"model-73",cat:"compliance_status",q:"ComplianceEntry.email_sent_at tracks when ONE email was sent. For entries affecting multiple users, should this track per-user email delivery?",type:"yes_no",ctx:"ComplianceEntry.email_sent_at = DateTime — single timestamp for entire entry, notify_user_ids tracks target users",imp:"medium",hint:"Per-user tracking enables retry logic for failed individual deliveries but adds complexity"},
  {id:"model-74",cat:"general",q:"ExternalUser.access_level defaults to ASSIGNEE (full access). Should it default to the most restrictive level (VIEWER) for security?",type:"single_choice",opts:["ASSIGNEE is correct","VIEWER default","COMMENTER default"],ctx:"ExternalUser.access_level default=ExternalUserAccessLevel.ASSIGNEE — highest access level",imp:"high",hint:"Defaulting to full access for external parties is a security risk; principle of least privilege suggests VIEWER"},
  {id:"model-75",cat:"products",q:"Product cascade-deletes compliance impact analyses when deleted. Since impact analyses contain financial data ($estimated_cost), should they be retained for budgeting history?",type:"yes_no",ctx:"Product.compliance_impact_analyses cascade='all, delete-orphan'",imp:"high",hint:"Deleted analyses mean historical compliance cost data is lost, affecting trend analysis and budgeting"},
  {id:"model-76",cat:"regulations",q:"Standard.status is a free-text String(50) with possible values 'active', 'withdrawn', 'superseded', 'draft'. Should this use an enum to prevent data inconsistency?",type:"yes_no",ctx:"Standard.status = String(50), default='active' — no constraint on allowed values",imp:"high",hint:"Free text allows typos like 'Active' vs 'active' vs 'ACTIVE' which break filtering and reporting"},
  {id:"model-77",cat:"regulations",q:"OJMapping.restriction_type defaults to NONE. When a new OJ mapping is created, should the default be 'FULL' to force verification that there are no restrictions?",type:"single_choice",opts:["NONE is correct","FULL default","PARTIAL default","No default - force selection"],ctx:"OJMapping.restriction_type default=OJRestrictionType.NONE",imp:"high",hint:"Defaulting to NONE means a missing restriction check could lead to assuming a standard has presumption of conformity when it doesn't"},
  {id:"model-78",cat:"general",q:"Organization has separate signatory fields (signatory_name, signatory_title, signatory_email). Should there be support for multiple signatories (e.g., different per product line or country)?",type:"yes_no",ctx:"Organization: signatory_name, signatory_title, signatory_email — all nullable String columns",imp:"medium",hint:"Large organizations may need different authorized signatories for different product lines or jurisdictions"},
  {id:"model-79",cat:"compliance_status",q:"ComplianceEntry checksum includes headline in the hash. If the same issue is reported with a slightly different headline, it creates a duplicate entry. Should checksum exclude headline?",type:"yes_no",ctx:"checksum = SHA256(f'{headline}:{legal_act_id}:{product_id}:{regulation_id}:{standard_id}:{certificate_id}')",imp:"high",hint:"Including headline prevents genuinely different issues from being deduplicated, but means rephrased duplicates slip through"},
  {id:"model-80",cat:"strategy",q:"Organization.max_products is nullable (NULL = unlimited). Should there be a hard system-wide limit to prevent database bloat regardless of plan?",type:"yes_no",ctx:"Organization.max_products = Integer, nullable=True — NULL means unlimited products",imp:"medium",hint:"Without any limit, a single organization could create millions of products, affecting system performance"},
  {id:"model-81",cat:"certificates",q:"Certificate.product_id is nullable (nullable=True) with ondelete='CASCADE'. This means certificates without a product are orphaned, and certificates WITH a product are cascade-deleted. Should unlinked certificates be allowed?",type:"yes_no",ctx:"Certificate.product_id nullable=True, ondelete='CASCADE'",imp:"high",hint:"Some certificates apply to the organization as a whole (e.g., ISO 9001) rather than specific products"},
  {id:"model-82",cat:"compliance_status",q:"ComplianceEntry allows CRITICAL severity to be set from any source. The MEMORY.md states CRITICAL should ONLY come from OJ Mapping expiration. Should there be a code-level constraint enforcing this?",type:"yes_no",ctx:"CRITICAL(450) is documented as ONLY from OJ Mapping expiration tasks, but no DB-level constraint prevents other sources",imp:"critical",hint:"Without enforcement, a bug or manual override could create CRITICAL entries that shouldn't exist, causing false alarms on the compliance map"},

  {key:"documents",label:"Documents"},

];

// ═══════════════════════════════════════════════════════════════
// STATE — localStorage persistence
// ═══════════════════════════════════════════════════════════════

const STORAGE_KEY = 'productlex_expert_answers';

function loadAnswers() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  } catch { return {}; }
}

function saveAnswer(questionId, value, notes) {
  const answers = loadAnswers();
  answers[questionId] = {
    answer: value,
    notes: notes || null,
    timestamp: new Date().toISOString(),
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
  render();
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

let activeCat = 'certificates';

function render() {
  const answers = loadAnswers();
  const totalQ = QUESTIONS.length;
  const totalA = Object.keys(answers).filter(k => answers[k].answer !== 'not_sure').length;

  // Progress
  document.getElementById('progressCount').textContent = `${totalA} / ${totalQ} answered`;
  document.getElementById('progressFill').style.width = totalQ ? `${(totalA/totalQ)*100}%` : '0%';

  // Export info
  document.getElementById('exportInfo').textContent = `${Object.keys(answers).length} responses saved locally`;

  // Category tabs
  const tabsEl = document.getElementById('catTabs');
  tabsEl.innerHTML = CATEGORIES.map(c => {
    const catQs = QUESTIONS.filter(q => q.cat === c.key);
    const catAs = catQs.filter(q => answers[q.id] && answers[q.id].answer !== 'not_sure').length;
    const isActive = c.key === activeCat;
    const isComplete = catAs === catQs.length && catQs.length > 0;
    return `<button class="cat-tab${isActive?' active':''}" onclick="setCategory('${c.key}')">
      ${c.label}
      <span class="cat-badge${isComplete?' complete':''}">${catAs}/${catQs.length}</span>
    </button>`;
  }).join('');

  // Questions
  const container = document.getElementById('questionsContainer');
  const catQs = QUESTIONS.filter(q => q.cat === activeCat);
  container.innerHTML = catQs.map((q, i) => {
    const ans = answers[q.id];
    const isAnswered = ans && ans.answer !== 'not_sure';
    return renderCard(q, i, catQs.length, ans, isAnswered);
  }).join('');
}

function renderCard(q, idx, total, ans, isAnswered) {
  const impClass = q.imp;
  let answerHtml = '';

  if (isAnswered && ans) {
    answerHtml = `
      <div class="q-answered-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        <span class="q-answer-val">${ans.answer.toUpperCase()}</span>
        <span class="q-answer-info">${new Date(ans.timestamp).toLocaleDateString()}</span>
      </div>
      ${ans.notes ? `<div class="q-answer-notes">"${ans.notes}"</div>` : ''}
      <button class="btn-change" onclick="document.getElementById('edit-${q.id}').classList.toggle('hidden')">Change answer</button>
      <div id="edit-${q.id}" class="hidden" style="margin-top:12px">
        ${renderButtons(q)}
      </div>
    `;
  } else {
    answerHtml = renderButtons(q);
  }

  return `
    <div class="q-card${isAnswered?' answered':''}">
      <div class="q-meta">
        <span class="q-num">Question ${idx+1} of ${total}</span>
        <span class="q-imp ${impClass}">${q.imp}</span>
      </div>
      <div class="q-text">${q.q}</div>
      ${q.ctx ? `<div class="q-context">${q.ctx}</div>` : ''}
      ${answerHtml}
    </div>
  `;
}

function renderButtons(q) {
  let buttons = '';
  if (q.type === 'yes_no') {
    buttons = `
      <button class="btn-answer btn-yes" onclick="answer('${q.id}','yes')">Yes</button>
      <button class="btn-answer btn-no" onclick="answer('${q.id}','no')">No</button>
    `;
  } else if (q.type === 'single_choice' && q.opts) {
    buttons = q.opts.map(o =>
      `<button class="btn-answer btn-choice" onclick="answer('${q.id}','${o.replace(/'/g,"\\'")}')">${o}</button>`
    ).join('');
  }
  buttons += `<button class="btn-answer btn-skip" onclick="answer('${q.id}','not_sure')">Not sure</button>`;

  return `
    <div class="q-actions">${buttons}</div>
    <input class="notes-input" id="notes-${q.id}" placeholder="Optional: explain your reasoning..." onkeydown="if(event.key==='Enter'){let v=this.value;this.value='';}" />
  `;
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════

function setCategory(cat) {
  activeCat = cat;
  render();
  window.scrollTo({top: 200, behavior: 'smooth'});
}

function answer(qId, value) {
  const notesEl = document.getElementById('notes-' + qId);
  const notes = notesEl ? notesEl.value : '';
  saveAnswer(qId, value, notes);
}

function getExportData() {
  const answers = loadAnswers();
  const exportData = [];
  for (const q of QUESTIONS) {
    const ans = answers[q.id];
    if (ans) {
      exportData.push({
        question_id: q.id,
        category: q.cat,
        question: q.q,
        answer: ans.answer,
        notes: ans.notes,
        agent_hint: q.hint,
        importance: q.imp,
        timestamp: ans.timestamp,
      });
    }
  }
  return exportData;
}

function copyAnswers() {
  const data = getExportData();
  navigator.clipboard.writeText(JSON.stringify(data, null, 2)).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function downloadAnswers() {
  const data = getExportData();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `productlex-expert-answers-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Initial render
render();
</script>
