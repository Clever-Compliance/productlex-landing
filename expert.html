<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expert Questionnaire — ProductLex AI</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #ffffff;
      --color-bg-warm: #fafaf8;
      --color-bg-soft: #f4f3f0;
      --color-bg-muted: #edecea;
      --color-surface: #e8e7e4;
      --color-border: #dddcd9;
      --color-border-subtle: #e8e7e4;
      --color-text: #1a1a1a;
      --color-text-secondary: #5a5a58;
      --color-text-tertiary: #8a8a86;
      --color-accent: #4f46e5;
      --color-accent-light: #6366f1;
      --color-accent-bg: #eef2ff;
      --color-accent-soft: rgba(79, 70, 229, 0.08);
      --color-green: #16a34a;
      --color-green-bg: #f0fdf4;
      --color-amber: #d97706;
      --color-amber-bg: #fffbeb;
      --color-red: #dc2626;
      --color-red-bg: #fef2f2;
      --color-dark: #111111;
      --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 12px;
      --radius-lg: 20px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--color-bg-warm);
      color: var(--color-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      padding: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px;
    }

    a { color: inherit; text-decoration: none; }

    .page-wrapper {
      max-width: 780px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Header */
    .page-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .page-logo-icon {
      width: 38px; height: 38px;
      background: var(--color-dark);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: white;
    }
    .page-logo-text {
      font-weight: 700; font-size: 22px;
      letter-spacing: -0.03em; color: var(--color-text);
    }

    .page-header {
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 26px; font-weight: 800;
      letter-spacing: -0.03em; margin-bottom: 8px;
    }

    /* Warning banner */
    .warning-banner {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--color-amber-bg);
      border: 1px solid #fde68a;
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 28px;
      font-size: 14px; color: #92400e; line-height: 1.5;
    }
    .warning-banner svg { flex-shrink: 0; margin-top: 2px; }

    /* Progress */
    .progress-wrapper {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 18px 22px;
      margin-bottom: 24px;
    }
    .progress-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .progress-label { font-size: 14px; font-weight: 600; }
    .progress-count { font-size: 13px; color: var(--color-text-tertiary); }
    .progress-bar {
      width: 100%; height: 8px;
      background: var(--color-bg-muted);
      border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--color-accent);
      border-radius: 99px; transition: width 0.4s ease;
    }

    /* Category tabs */
    .cat-tabs {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 24px;
    }
    .cat-tab {
      font-family: var(--font);
      font-size: 13.5px; font-weight: 600;
      padding: 8px 16px; border-radius: 50px;
      border: 1.5px solid var(--color-border);
      background: var(--color-bg); color: var(--color-text-secondary);
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .cat-tab:hover { border-color: var(--color-text-tertiary); }
    .cat-tab.active {
      background: var(--color-accent); color: white;
      border-color: var(--color-accent);
    }
    .cat-badge {
      font-size: 11px; font-weight: 700;
      padding: 1px 7px; border-radius: 50px;
    }
    .cat-tab.active .cat-badge {
      background: rgba(255,255,255,0.25); color: white;
    }
    .cat-tab:not(.active) .cat-badge {
      background: var(--color-bg-muted); color: var(--color-text-tertiary);
    }
    .cat-tab:not(.active) .cat-badge.complete {
      background: var(--color-green-bg); color: var(--color-green);
    }

    /* Question card */
    .q-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .q-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .q-card.answered {
      background: var(--color-bg-warm);
      border-color: var(--color-border-subtle);
    }

    .q-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .q-num { font-size: 12px; color: var(--color-text-tertiary); font-weight: 500; }
    .q-imp {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; padding: 3px 10px; border-radius: 50px;
    }
    .q-imp.critical { background: var(--color-red-bg); color: var(--color-red); }
    .q-imp.high { background: var(--color-amber-bg); color: var(--color-amber); }
    .q-imp.medium { background: var(--color-accent-bg); color: var(--color-accent); }

    .q-text {
      font-size: 16px; font-weight: 600; line-height: 1.45;
      letter-spacing: -0.01em; margin-bottom: 8px;
    }
    .q-context {
      font-size: 13.5px; color: var(--color-text-secondary);
      line-height: 1.55; margin-bottom: 20px;
    }

    /* Answer buttons */
    .q-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .btn-answer {
      font-family: var(--font);
      font-size: 14px; font-weight: 600;
      padding: 10px 24px; border-radius: 50px;
      border: none; cursor: pointer; transition: all 0.2s;
    }
    .btn-answer:hover { transform: translateY(-1px); }
    .btn-answer:active { transform: translateY(0); }

    .btn-yes { background: var(--color-green); color: white; }
    .btn-yes:hover { box-shadow: 0 2px 12px rgba(22, 163, 74, 0.3); }
    .btn-no { background: var(--color-red); color: white; }
    .btn-no:hover { box-shadow: 0 2px 12px rgba(220, 38, 38, 0.3); }
    .btn-choice { background: var(--color-accent); color: white; }
    .btn-choice:hover { background: var(--color-accent-light); box-shadow: 0 2px 12px rgba(79, 70, 229, 0.25); }
    .btn-skip {
      background: var(--color-bg-muted); color: var(--color-text-secondary);
    }
    .btn-skip:hover { background: var(--color-surface); }

    .notes-input {
      width: 100%; font-family: var(--font); font-size: 13.5px;
      padding: 10px 14px; border: 1.5px solid var(--color-border);
      border-radius: 10px; background: var(--color-bg);
      color: var(--color-text); outline: none; transition: border-color 0.2s;
    }
    .notes-input::placeholder { color: var(--color-text-tertiary); }
    .notes-input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px var(--color-accent-soft);
    }

    /* Answered state */
    .q-answered-box {
      display: flex; align-items: center; gap: 10px;
      background: var(--color-green-bg);
      border: 1px solid #bbf7d0;
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .q-answered-box svg { flex-shrink: 0; }
    .q-answer-val { font-size: 14px; font-weight: 700; color: #166534; }
    .q-answer-info { font-size: 12px; color: #15803d; margin-left: auto; }
    .q-answer-notes { font-size: 13px; color: #166534; font-style: italic; padding: 0 4px; }
    .btn-change {
      font-family: var(--font);
      font-size: 12px; font-weight: 600;
      color: var(--color-accent); background: none; border: none;
      cursor: pointer; padding: 4px 0;
    }
    .btn-change:hover { text-decoration: underline; }

    /* Export bar */
    .export-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--color-bg);
      border-top: 1px solid var(--color-border);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      z-index: 100;
    }
    .btn-export {
      font-family: var(--font);
      font-size: 13.5px; font-weight: 600;
      padding: 10px 24px; border-radius: 50px;
      border: 1.5px solid var(--color-border);
      background: var(--color-bg); color: var(--color-text);
      cursor: pointer; transition: all 0.2s;
    }
    .btn-export:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .btn-export.primary {
      background: var(--color-accent); color: white; border-color: var(--color-accent);
    }
    .btn-export.primary:hover {
      background: var(--color-accent-light); box-shadow: 0 2px 12px rgba(79, 70, 229, 0.25);
    }
    .export-info { font-size: 13px; color: var(--color-text-tertiary); }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .page-wrapper { padding: 24px 16px 100px; }
      .q-card { padding: 20px; }
      .btn-answer { padding: 9px 18px; font-size: 13.5px; }
    }
  </style>
</head>
<body>

<div class="page-wrapper">
  <!-- Logo -->
  <a href="index.html" class="page-logo">
    <div class="page-logo-icon">P</div>
    <span class="page-logo-text">ProductLex</span>
  </a>

  <!-- Header -->
  <div class="page-header">
    <h1>Compliance Expert Questionnaire</h1>
    <p style="font-size:15px;color:var(--color-text-secondary);">Help our AI agents make smarter compliance decisions by answering these questions.</p>
  </div>

  <!-- Warning -->
  <div class="warning-banner">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <span>Only answer when you are <strong>100% certain</strong>. Use "Not sure" to skip anything you're uncertain about. Wrong answers are worse than no answer.</span>
  </div>

  <!-- Progress -->
  <div class="progress-wrapper">
    <div class="progress-top">
      <span class="progress-label">Overall Progress</span>
      <span class="progress-count" id="progressCount">0 / 0 answered</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Category tabs -->
  <div class="cat-tabs" id="catTabs"></div>

  <!-- Questions container -->
  <div id="questionsContainer"></div>
</div>

<!-- Export bar -->
<div class="export-bar">
  <span class="export-info" id="exportInfo"></span>
  <button class="btn-export" onclick="copyAnswers()">Copy JSON</button>
  <button class="btn-export primary" onclick="downloadAnswers()">Download Answers</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// ALL QUESTIONS — embedded directly, no backend needed
// ═══════════════════════════════════════════════════════════════

const QUESTIONS = [
  // ══════════════════════════════════════════════════════════════════════════
  // CERTIFICATES — From certificate.py, hub_document_sync_service.py,
  //   compliance_entry_tasks.py certificate expiration logic
  // ══════════════════════════════════════════════════════════════════════════
  {id:"cert-1",cat:"certificates",q:"Should a certificate with a NULL expiry_date be treated as perpetually valid, or should it require periodic revalidation?",type:"single_choice",opts:["Perpetually valid (current behavior)","Requires revalidation every 3 years","Requires revalidation every 5 years","Should be flagged for manual review"],ctx:"Code treats NULL expiry_date as non-expiring (is_expiring_soon returns False, is_expired returns False)",imp:"high",hint:"If perpetual certificates need revalidation, the system needs a new 'revalidation_due' workflow"},
  {id:"cert-2",cat:"certificates",q:"The default 'expiring soon' threshold is 30 days. Is this the correct window for all certificate types?",type:"single_choice",opts:["30 days is correct for all types","CE/UKCA need 90 days, others 30 days","Medical device certs need 180 days","Different by jurisdiction (EU=90, US=60, others=30)"],ctx:"Certificate.is_expiring_soon() defaults to days=30",imp:"critical",hint:"Different certificate types may need different lead times for renewal processes"},
  {id:"cert-3",cat:"certificates",q:"Should ISO management system certificates (ISO 9001, ISO 14001, etc.) be scoped at organization level rather than product level?",type:"yes_no",ctx:"Hub document sync maps ISO certificates to ORGANIZATION scope, but the Certificate model links to product_id",imp:"high",hint:"ISO certificates cover entire organizations, not individual products — affects compliance scoring"},
  {id:"cert-4",cat:"certificates",q:"When a certificate expires, should its status automatically transition from VALID to EXPIRED in the database?",type:"single_choice",opts:["Yes, automatically on expiry date","Only after manual confirmation","Only after a grace period (e.g., 30 days)","Keep VALID status but add warning flag"],ctx:"Code checks is_expired() based on date comparison but does not auto-update the status column in DB",imp:"high",hint:"Current gap: expired certificates remain status=VALID in DB, only detected by date comparison"},
  {id:"cert-5",cat:"certificates",q:"Should all certificate types require an issuing authority, or should self-declarations (e.g., EU DoC) be allowed without one?",type:"single_choice",opts:["All certificates must have issuing authority (current)","Self-declarations allowed without issuing authority","Depends on certificate type","Depends on jurisdiction"],ctx:"issuing_authority is nullable=False in the Certificate model",imp:"medium",hint:"EU Declarations of Conformity are self-issued and may not have an external issuing authority"},
  {id:"cert-6",cat:"certificates",q:"When all linked tasks for a certificate are completed, should the certificate auto-update to VALID status?",type:"yes_no",ctx:"auto_update_on_completion defaults to True, completion_percentage and ready_for_review_at fields exist",imp:"medium",hint:"Controls whether task completion triggers automatic certificate status changes"},
  {id:"cert-7",cat:"certificates",q:"Is the geographic_coverage field in cert_metadata sufficient, or should certificates have explicit market/country associations?",type:"single_choice",opts:["JSON metadata is sufficient","Need explicit country association table","Need both — metadata for display, table for queries","Depends on certificate type"],ctx:"Geographic coverage stored as JSON array in cert_metadata, not queryable for compliance map",imp:"high",hint:"Certificate geographic scope cannot currently drive compliance map status per country"},
  {id:"cert-8",cat:"certificates",q:"Should 'pending' certificates count toward product compliance?",type:"yes_no",ctx:"A pending certificate means the application has been submitted but not yet approved.",imp:"high",hint:"If yes, treat pending certificates as partial compliance. If no, treat as non-compliant until approved."},
  {id:"cert-9",cat:"certificates",q:"For the hub document sync, should the renewal_lead_days always be 90 days, or vary by document type?",type:"single_choice",opts:["90 days for all (current behavior)","Certificates=90, test reports=60, documents=30","Configurable per organization","Based on certificate type (CE=120, FCC=60, ISO=180)"],ctx:"renewal_lead_days hardcoded to 90 in hub_document_sync_service.py for all document types",imp:"high",hint:"Different document types have vastly different renewal timelines"},
  {id:"cert-10",cat:"certificates",q:"Should revoked certificates trigger a CRITICAL compliance entry, or is WARNING sufficient?",type:"single_choice",opts:["WARNING is sufficient (current behavior)","Should be CRITICAL","Should be a new URGENT level","Depends on certificate type"],ctx:"CertificateStatus has REVOKED and EXPIRED but compliance entries treat both as WARNING severity. CRITICAL reserved for OJ mapping only.",imp:"critical",hint:"Revocations are typically more urgent than expirations and may require different workflows"},
  {id:"cert-11",cat:"certificates",q:"When a product has multiple certificates of the same type (e.g., two CE certificates for different directives), should both count for compliance?",type:"single_choice",opts:["All valid certificates count","Only the most recent counts","Each must cover different scope/directive","Organization should consolidate"],ctx:"Compliance score counts distinct product_ids with valid certificates, not coverage completeness",imp:"high",hint:"A product may need multiple certificates under different EU directives (MDR, IVDR, LVD, EMC)"},
  {id:"cert-12",cat:"certificates",q:"For certificate expiration entries, the code checks markings with status OBTAINED or PENDING. Should PENDING markings generate expiration warnings?",type:"yes_no",ctx:"create_certificate_expiration_entries filters ProductMarking.status.in_([OBTAINED, PENDING])",imp:"medium",hint:"PENDING markings have not been obtained yet — generating expiration warnings for them may be confusing"},
  {id:"cert-13",cat:"certificates",q:"Should the system automatically create renewal tasks when a certificate enters the 'expiring soon' window?",type:"yes_no",ctx:"System creates ComplianceEntries and notifications but does not auto-create Tasks for renewal",imp:"high",hint:"Currently users must manually create renewal tasks after seeing expiration notifications"},
  {id:"cert-14",cat:"certificates",q:"Is WARNING the correct severity for all expired certificates, regardless of how long ago they expired?",type:"single_choice",opts:["WARNING for all expired (current behavior)","WARNING < 30 days, escalate to higher after","Severity increases with time expired","Depends on certificate type"],ctx:"All expired certificates get EntryType.WARNING, CRITICAL reserved for OJ mapping only",imp:"critical",hint:"A certificate expired 1 day ago vs 1 year ago may warrant different urgency levels"},
  {id:"cert-15",cat:"certificates",q:"Should certificate compliance entries be automatically resolved when a certificate is renewed?",type:"yes_no",ctx:"Compliance entries for certificate expirations are never auto-resolved — they must be manually completed",imp:"high",hint:"When a new valid certificate replaces an expired one, the old expiration entry should auto-close"},
  {id:"cert-16",cat:"certificates",q:"For the product compliance overview widget, a product is considered 'certified' if it has ANY valid certificate. Should it require specific certificate types based on target markets?",type:"single_choice",opts:["Any valid certificate counts (current)","Must match required certificate types per market","Must have CE for EU, FCC for US, etc.","Organization defines required certificate types"],ctx:"Widget counts products with at least one valid certificate as 'certified'",imp:"critical",hint:"A product with only an FCC certificate should not show as compliant for EU markets"},
  {id:"cert-17",cat:"certificates",q:"Can one certificate cover multiple products simultaneously?",type:"yes_no",ctx:"Certificate model has product_id (single product link). Some certifications cover product families.",imp:"high",hint:"If yes, certificate-based compliance should consider shared certificates across products."},
  {id:"cert-18",cat:"certificates",q:"Does a renewed certificate (same type, same product) make the old compliance entries irrelevant?",type:"yes_no",ctx:"When a certificate is renewed, the old one may still be needed for historical compliance records.",imp:"medium",hint:"If yes, agents can auto-resolve entries related to expired certificates that have been renewed."},
  {id:"cert-19",cat:"certificates",q:"Can a certificate be valid in one country but invalid in another?",type:"yes_no",ctx:"Certificates may have geographic scope limitations based on the issuing authority (e.g., CE = EU only).",imp:"high",hint:"If yes, compliance map should evaluate certificate validity per-country, not globally."},
  {id:"cert-20",cat:"certificates",q:"Is a product without any linked certificate always non-compliant?",type:"yes_no",ctx:"Some products may not require certificates depending on their category or target markets.",imp:"critical",hint:"If no, agents should check whether certificates are required for the product category before marking non-compliant."},

  // ══════════════════════════════════════════════════════════════════════════
  // COMPLIANCE MAP — From complianceMapUtils.ts, compliance_entry_service.py,
  //   compliance_map_bridges.py
  // ══════════════════════════════════════════════════════════════════════════
  {id:"map-1",cat:"compliance_status",q:"The compliance map uses MAX(severity) across all countries. Should a single CRITICAL entry in one country make the entire global status CRITICAL?",type:"single_choice",opts:["Yes, MAX across all (current behavior)","Weighted by number of products per country","Separate status per region","Only if CRITICAL affects > 10% of products"],ctx:"calculateAggregatedStatus uses MAX(status severity) across all countries with products",imp:"critical",hint:"One critical issue in a minor market could make the global dashboard appear worse than reality"},
  {id:"map-2",cat:"compliance_status",q:"Countries with products but no compliance entries show as 'Compliant' (green). Is this correct, or should they show as 'Not Assessed'?",type:"single_choice",opts:["Compliant is correct (no issues = compliant)","Should show as 'Not Assessed'","Should show as 'Needs Review'","Depends on whether compliance rules have been evaluated"],ctx:"No entries for a product = Compliant status in the map",imp:"critical",hint:"Absence of issues is not the same as confirmed compliance — could give false sense of security"},
  {id:"map-3",cat:"compliance_status",q:"The risk layer uses thresholds: 0-30 (green), 31-60 (orange), 61-100 (red). Are these risk score boundaries correct for your industry?",type:"single_choice",opts:["0-30/31-60/61-100 is correct","0-25/26-50/51-100 (more conservative)","0-40/41-70/71-100 (more lenient)","Should be configurable per organization"],ctx:"getLayerColor for 'risk' uses hardcoded thresholds: <=30 green, <=60 orange, >60 red",imp:"high",hint:"Different industries have different risk tolerances — medical devices may need tighter thresholds"},
  {id:"map-4",cat:"compliance_status",q:"For the certificate expiry layer, the color thresholds are: 0 (gray), 1-2 (blue), 3-5 (orange), 6+ (red). Are these count thresholds appropriate?",type:"single_choice",opts:["Current thresholds are appropriate","Should be based on percentage of total certs, not absolute count","1 expiring = warning, 3+ = critical","Should vary by organization size"],ctx:"getLayerColor for 'cert_expiry' uses: 0=gray, <=2=blue, <=5=orange, >5=red",imp:"medium",hint:"A large organization with 100 certificates and 5 expiring is different from one with 10 certificates and 5 expiring"},
  {id:"map-5",cat:"compliance_status",q:"Should predictive regulation entries (from the PredictiveRegulationBridge) appear on the compliance map by default?",type:"single_choice",opts:["Yes, always visible as INFO","Only when confidence >= 75%","Only with explicit user opt-in","Never on main map, separate predictive view only"],ctx:"PredictiveRegulationComplianceEntryBridge creates INFO entries for confidence >= 0.75",imp:"high",hint:"Showing predictions on the compliance map could cause confusion with actual compliance issues"},
  {id:"map-6",cat:"compliance_status",q:"Should US states be treated as separate compliance jurisdictions on the map, or rolled up into a single US entry?",type:"single_choice",opts:["Separate jurisdictions (current behavior)","Rolled up into single US entry","Both — US entry shows worst state status","Configurable per organization"],ctx:"Map supports both world view and US-states view, hasUsTargets checks for US-XX codes",imp:"high",hint:"US regulatory landscape varies significantly by state for certain product categories"},
  {id:"map-7",cat:"compliance_status",q:"Should NoNotification (no data) have the same priority as Compliant on the map, or be treated differently?",type:"single_choice",opts:["Same as Compliant (current: both priority 0)","Lower than Compliant (NoData should be 'unknown')","Higher than Compliant but lower than Info","Should be treated as 'needs assessment'"],ctx:"STATUS_PRIORITY maps both Compliant and NoNotification to 0",imp:"medium",hint:"NoNotification means 'no data' which is different from 'confirmed compliant'"},
  {id:"map-8",cat:"compliance_status",q:"When a compliance entry has country=NULL, it applies to all countries. Should it instead only apply to the product's target countries?",type:"single_choice",opts:["Apply to all countries (current behavior)","Only product's target_countries","Only countries where product has certificates","Configurable per entry type"],ctx:"Country filter: entries with matching country OR NULL country (global entries apply everywhere)",imp:"high",hint:"A global entry appearing in every country may overstate the scope of an issue"},
  {id:"map-9",cat:"compliance_status",q:"The compliance rate average is unweighted across countries. Should it be weighted by number of products per country?",type:"single_choice",opts:["Simple average (current behavior)","Weighted by product count per country","Weighted by revenue per country","Median instead of mean"],ctx:"avgRate = sum / count of evaluated countries, no weighting",imp:"medium",hint:"A country with 100 products should matter more than a country with 1 product"},
  {id:"map-10",cat:"compliance_status",q:"Should the compliance map show the WORST status across all products for a country?",type:"yes_no",ctx:"Alternative: show average/weighted status. Currently uses MAX(severity) approach.",imp:"critical",hint:"If yes, continue using MAX(severity) for country-level status on the compliance map."},
  {id:"map-11",cat:"compliance_status",q:"The rule engine bridge maps non_compliant (score < 50%) to WARNING. Is 50% the correct threshold?",type:"single_choice",opts:["50% is correct","Should be 70% (stricter)","Should be 30% (more lenient)","Configurable per regulation type"],ctx:"RuleEngineComplianceEntryBridge: NON_COMPLIANT (score < 50%) -> WARNING, PARTIAL (50-79%) -> TASK",imp:"critical",hint:"The non-compliant threshold determines when products appear as WARNING on the map"},
  {id:"map-12",cat:"compliance_status",q:"For products with regulations but no valid certificates, the certificate gap bridge creates an INFO entry. Should this be elevated?",type:"single_choice",opts:["INFO is correct (current behavior)","Should be TASK (action required)","Should be WARNING (compliance gap)","Depends on regulation type (MDR=WARNING, others=INFO)"],ctx:"CertificateGapComplianceEntryBridge.sync_uncovered_products creates EntryType.INFO",imp:"high",hint:"A product with regulations but no certificates may be non-compliant, which is worse than INFO"},
  {id:"map-13",cat:"compliance_status",q:"Should TASK entries count toward a country's compliance status color on the map?",type:"yes_no",ctx:"TASK entries (severity 250) are action items. Including them makes the map more conservative.",imp:"high",hint:"If no, exclude TASK-level entries from compliance map color calculations."},
  {id:"map-14",cat:"compliance_status",q:"Does compliance percentage on the map represent products or regulations?",type:"single_choice",opts:["Products","Regulations","Both"],ctx:"A country could show '80% compliant' meaning 80% of products or 80% of regulations are met.",imp:"critical",hint:"Determines what the compliance map percentage represents."},

  // ══════════════════════════════════════════════════════════════════════════
  // COMPLIANCE ENTRIES — From compliance_entry_tasks.py,
  //   compliance_entry_service.py, compliance_entry.py model
  // ══════════════════════════════════════════════════════════════════════════
  {id:"entry-1",cat:"compliance_status",q:"CRITICAL severity is exclusively reserved for OJ mapping expirations. Should any other conditions also trigger CRITICAL?",type:"single_choice",opts:["Only OJ mapping expiration (current)","Also for certificate revocations","Also for safety-related regulation changes","Also for regulatory enforcement actions"],ctx:"Comments throughout code: 'CRITICAL is ONLY for harmonised standard OjMapping expiration'",imp:"critical",hint:"This is a fundamental business rule — expanding CRITICAL changes the meaning of red on the map"},
  {id:"entry-2",cat:"compliance_status",q:"Certificate expirations at 7, 28, and 90 days all create INFO entries. Should 7-day expirations be elevated to WARNING?",type:"single_choice",opts:["All INFO is correct (legacy behavior)","7 days = WARNING, 28/90 = INFO","7 days = WARNING, 28 days = TASK, 90 days = INFO","Configurable per organization"],ctx:"Thresholds: (7, EntryType.INFO), (28, EntryType.INFO), (90, EntryType.INFO)",imp:"high",hint:"A certificate expiring in 7 days is arguably more urgent than one expiring in 90 days"},
  {id:"entry-3",cat:"compliance_status",q:"The dedup checksum uses headline + entity IDs. Should entry_type (severity) also be part of the checksum?",type:"single_choice",opts:["Current fields are sufficient","Add entry_type to checksum","Add compliance_entry_type to checksum","Add both entry_type and source"],ctx:"checksum = SHA256(headline:legal_act_id:product_id:regulation_id:standard_id:certificate_id)",imp:"high",hint:"Without entry_type in checksum, if the same issue escalates in severity, it will be treated as a duplicate"},
  {id:"entry-4",cat:"compliance_status",q:"Dedup only checks incomplete entries (completed_at IS NULL). Should it also check recently completed entries?",type:"single_choice",opts:["Only incomplete is correct (current)","Also check entries completed within 7 days","Also check entries completed within 30 days","Check all entries regardless of completion"],ctx:"Duplicate check: completed_at.is_(None) AND is_active == True",imp:"medium",hint:"If an entry is completed and the same condition recurs next day, a new entry is created (by design)"},
  {id:"entry-5",cat:"regulations",q:"Regulation changes detected in the last 24 hours are processed. Should this window be longer to catch changes on weekends?",type:"single_choice",opts:["24 hours is correct","48 hours (covers weekends with daily runs)","36 hours (some overlap for safety)","7 days with dedup handling"],ctx:"cutoff = datetime.now(timezone.utc) - timedelta(hours=24)",imp:"medium",hint:"If the task fails on Friday, Saturday changes could be missed until Monday"},
  {id:"entry-6",cat:"regulations",q:"For regulation changes, direct product match creates WARNING but indirect match (via legal act) creates INFO. Is this distinction correct?",type:"single_choice",opts:["WARNING/INFO is correct (current)","Both should be WARNING","Direct=WARNING, Indirect=TASK","Depends on change type (amendment vs repeal)"],ctx:"Direct match -> WARNING, Indirect match -> INFO",imp:"high",hint:"An indirect regulatory change can still have significant compliance implications"},
  {id:"entry-7",cat:"compliance_status",q:"Products marked as in_review get TASK severity. Should in_review be treated as higher priority?",type:"single_choice",opts:["TASK is correct for in_review","Should be WARNING (needs immediate attention)","Should be INFO (just tracking)","Depends on how long it has been in review"],ctx:"status_to_entry_type = {'non_compliant': WARNING, 'in_review': TASK}",imp:"medium",hint:"A product stuck in review for 6 months may need escalation"},
  {id:"entry-8",cat:"compliance_status",q:"OJ mapping WARNING entries use a 30-day threshold before expiry. Is 30 days sufficient for organizations to act?",type:"single_choice",opts:["30 days is sufficient","Should be 60 days","Should be 90 days","Should be 180 days for standard body processes"],ctx:"warning_threshold = today + timedelta(days=30) for OJ mapping expiration",imp:"high",hint:"Harmonised standard transition periods can require significant preparation time"},
  {id:"entry-9",cat:"regulations",q:"Impact level mapping: critical/high -> WARNING, medium/low -> INFO. Should 'critical' impact regulation changes create higher severity?",type:"single_choice",opts:["WARNING is correct (CRITICAL reserved for OJ only)","Critical impact should create CRITICAL entries","Critical impact should be a new 'URGENT WARNING' level","Depends on change type (repeal = higher severity)"],ctx:"impact_to_entry_type = {'critical': WARNING, 'high': WARNING, 'medium': INFO, 'low': INFO}",imp:"critical",hint:"A regulation repeal with critical impact could arguably warrant CRITICAL severity"},
  {id:"entry-10",cat:"compliance_status",q:"Should the checksum include the country field to allow the same issue to exist separately for different countries?",type:"yes_no",ctx:"Checksum = SHA256(headline:legal_act_id:product_id:regulation_id:standard_id:certificate_id) — no country",imp:"high",hint:"Without country in checksum, a country-specific entry blocks creation of the same issue for another country"},
  {id:"entry-11",cat:"compliance_status",q:"Should compliance entries have an expiry mechanism where they auto-close after a certain period?",type:"single_choice",opts:["No auto-close (current behavior)","Auto-close after 180 days","Auto-close after 365 days","Auto-close INFO after 90 days, keep WARNING/CRITICAL"],ctx:"Entries remain active until manually completed or soft-deleted",imp:"medium",hint:"Stale entries can accumulate and make the dashboard noisy"},
  {id:"entry-12",cat:"compliance_status",q:"Should compliance entries support priority escalation over time (e.g., INFO to WARNING after 30 days without action)?",type:"yes_no",ctx:"Model has adjusted_priority_at and priority_adjustment_reason fields from DynamicPriorityAgent",imp:"high",hint:"The DynamicPriorityAgent infrastructure exists but may not be actively escalating entries"},
  {id:"entry-13",cat:"compliance_status",q:"Document expiration entries check documents expired in the last 90 days. Should older expired documents still generate entries?",type:"single_choice",opts:["90 days is correct cutoff","Should check all expired documents","Should be 180 days","Should be 30 days (older ones are the org's problem)"],ctx:"Document.valid_until >= today - timedelta(days=90) for expired document check",imp:"medium",hint:"Very old expired documents may indicate systemic neglect vs recent oversights"},
  {id:"entry-14",cat:"compliance_status",q:"Should compliance entries auto-resolve when the underlying issue is fixed (e.g., certificate renewed)?",type:"yes_no",ctx:"Currently entries are never auto-resolved — they must be manually completed. Rule engine bridge is the only exception.",imp:"high",hint:"If yes, implement auto-resolution logic in the compliance entry pipeline."},

  // ══════════════════════════════════════════════════════════════════════════
  // REGULATIONS & STANDARDS
  // ══════════════════════════════════════════════════════════════════════════
  {id:"reg-1",cat:"regulations",q:"Does a regulation amendment always require product re-evaluation?",type:"yes_no",ctx:"Amendments can range from minor editorial changes to fundamental requirement changes.",imp:"critical",hint:"If no, agents should analyze amendment scope before triggering re-evaluation."},
  {id:"reg-2",cat:"regulations",q:"Can a product be compliant with a regulation without having any certificate?",type:"yes_no",ctx:"Some regulations allow self-declaration of conformity without third-party certification.",imp:"high",hint:"If yes, compliance evaluation must consider self-declaration as valid compliance evidence."},
  {id:"reg-3",cat:"regulations",q:"Should a new version of a regulation automatically supersede the old one?",type:"yes_no",ctx:"New versions may have transition periods where both old and new apply.",imp:"high",hint:"If no, agents should check for transition periods before marking old version as superseded."},
  {id:"reg-4",cat:"regulations",q:"Can a product be exempt from a regulation that applies to its category?",type:"yes_no",ctx:"Some regulations have exemptions for specific product types, sizes, or uses.",imp:"high",hint:"If yes, agents should check for exemption criteria before flagging non-compliance."},
  {id:"reg-5",cat:"regulations",q:"Do harmonised standards always satisfy the regulation they are linked to?",type:"yes_no",ctx:"Harmonised standards provide presumption of conformity to the essential requirements.",imp:"critical",hint:"If yes, meeting a harmonised standard = meeting the regulation's requirements for compliance scoring."},
  {id:"reg-6",cat:"regulations",q:"Should scope_change type regulation changes trigger the same severity as amendments?",type:"yes_no",ctx:"Scope changes may add or remove product categories from a regulation's coverage.",imp:"high",hint:"If yes, treat scope_change with same severity as amendment. If no, use lower severity."},
  {id:"reg-7",cat:"regulations",q:"Does an effective_date_change require product re-evaluation, or just deadline tracking?",type:"single_choice",opts:["Full re-evaluation","Only update deadline tracking","Depends on how much the date moved","Depends on regulation type"],ctx:"An effective_date_change pushes the deadline but does not change requirements.",imp:"high",hint:"Defines whether effective_date_change triggers the entry creation pipeline."},

  // ══════════════════════════════════════════════════════════════════════════
  // PRODUCTS
  // ══════════════════════════════════════════════════════════════════════════
  {id:"prod-1",cat:"products",q:"Should inactive products be excluded from ALL compliance calculations?",type:"yes_no",ctx:"Inactive products might be discontinued but still in inventory or legacy markets.",imp:"high",hint:"If yes, filter out inactive products from compliance map, entries, and risk scores."},
  {id:"prod-2",cat:"products",q:"Should a product with no target_countries be treated as targeting all countries?",type:"yes_no",ctx:"Products without assigned target countries could mean 'global' or 'not yet configured'.",imp:"high",hint:"If no, treat as 'not configured' and exclude from country-specific compliance."},
  {id:"prod-3",cat:"products",q:"Does changing a product's category always require compliance re-evaluation?",type:"yes_no",ctx:"Product category determines which regulations apply.",imp:"critical",hint:"If yes, trigger compliance re-evaluation when product category changes."},
  {id:"prod-4",cat:"products",q:"Should products inherit compliance status from their parent company (e.g., company-level ISO 9001)?",type:"yes_no",ctx:"In some industries, company-level certifications cover all products.",imp:"medium",hint:"If yes, check company-level certifications as part of product compliance evaluation."},
  {id:"prod-5",cat:"products",q:"Should the system differentiate between products in development vs products on the market for compliance severity?",type:"single_choice",opts:["Same treatment for all products","Higher severity for market products","Lower severity for development products","Separate compliance tracks per phase"],ctx:"No product lifecycle phase filtering in compliance entry creation",imp:"high",hint:"A non-compliant product being sold is far more serious than one in early development"},
  {id:"prod-6",cat:"products",q:"The certificate gap bridge checks for 'any valid certificate' per product. Should it check for specific required certificate types?",type:"single_choice",opts:["Any valid certificate is sufficient (current)","Check against required types per market","Check against required types per regulation","Organization defines required certificate matrix"],ctx:"valid_cert_count = count(Certificate.product_id == product.id, status==VALID)",imp:"critical",hint:"A product with an ISO 9001 cert but no CE marking is not compliant for the EU market"},
  {id:"prod-7",cat:"products",q:"The analytics compliance rate equates 'products with certificates' to 'compliant products'. Should compliance also require regulation assessments?",type:"single_choice",opts:["Certificates only is sufficient","Certificates + regulation assessment","Certificates + no active WARNING/CRITICAL entries","Full compliance = certificates + assessments + no issues"],ctx:"compliance_rate = products_with_certs / total_products * 100",imp:"critical",hint:"A product with certificates but unevaluated new regulations is not truly compliant"},
  {id:"prod-8",cat:"products",q:"Should product families (variants) share the same compliance status?",type:"yes_no",ctx:"Product variants may differ in specifications that affect compliance (e.g., voltage, material).",imp:"medium",hint:"If no, evaluate each variant independently for compliance."},
  {id:"prod-9",cat:"products",q:"Is a product with 0 applicable regulations always 'compliant' by default?",type:"yes_no",ctx:"A product might have no applicable regulations because they haven't been identified yet.",imp:"high",hint:"If no, distinguish between 'no regulations found' and 'confirmed no regulations apply'."},
  {id:"prod-10",cat:"products",q:"Should the system track which specific regulations a product is compliant with, not just whether it has any certificate?",type:"yes_no",ctx:"ProductRegulation model exists but compliance map primarily uses certificate count for status",imp:"critical",hint:"Regulation-level compliance tracking is essential for proper compliance management"},

  // ══════════════════════════════════════════════════════════════════════════
  // MONITORING — From regulatory_monitor_service.py (1557 lines)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"mon-1",cat:"monitoring",q:"The circuit breaker opens after 5 consecutive errors. Is this the right threshold for regulatory monitoring?",type:"single_choice",opts:["5 errors is correct","3 errors (more aggressive)","10 errors (more tolerant)","Depends on source type (government APIs more tolerant)"],ctx:"CIRCUIT_BREAKER_THRESHOLD = 5 consecutive errors before pausing monitor",imp:"high",hint:"Government regulatory websites may have more frequent downtime than commercial APIs"},
  {id:"mon-2",cat:"monitoring",q:"The circuit breaker initial backoff is 60 minutes, max 24 hours. Should critical regulatory sources have shorter backoff?",type:"single_choice",opts:["Current settings are fine for all","High-priority sources: 15 min initial, 6 hour max","Vary by source type","Configurable per monitor"],ctx:"CIRCUIT_BREAKER_BASE_MINUTES = 60, CIRCUIT_BREAKER_MAX_HOURS = 24",imp:"medium",hint:"Missing a critical EU Official Journal update for 24 hours could be significant"},
  {id:"mon-3",cat:"monitoring",q:"Discovery tier monitors only check on their assigned day_of_week_slot. Monitors without a slot are checked every day. Is this correct?",type:"single_choice",opts:["Yes, NULL slot means check every day (current)","No, NULL slot should mean 'unassigned, skip'","Assign a random day on creation","Check twice a week by default"],ctx:"discovery tier filter includes day_of_week_slot.is_(None) OR day_of_week_slot == today_slot",imp:"medium",hint:"Monitors without assigned days are checked daily, which may be excessive for discovery tier"},
  {id:"mon-4",cat:"monitoring",q:"Product-linked monitors are prioritized over non-product-linked ones. Should there be additional prioritization criteria?",type:"single_choice",opts:["Product-linked priority is sufficient","Also prioritize by last change date","Also prioritize by number of affected products","Weighted scoring: products + severity + freshness"],ctx:"get_due_monitors orders by is_product_linked.desc(), next_check_at.asc()",imp:"medium",hint:"A monitor covering 50 products should perhaps be checked before one covering 1 product"},
  {id:"mon-5",cat:"monitoring",q:"Should ALL regulation changes trigger compliance re-evaluation, or only 'amendment' and 'new_version'?",type:"single_choice",opts:["All changes","Only amendment/new_version","All except effective_date_change","Configurable per regulation type"],ctx:"Change types: amendment, new_version, repeal, effective_date_change, scope_change.",imp:"critical",hint:"Defines which change types trigger the entry creation pipeline."},
  {id:"mon-6",cat:"monitoring",q:"Does a standard update always affect products linked to that standard?",type:"yes_no",ctx:"Standard updates can be minor (editorial) or major (technical requirements changed).",imp:"high",hint:"If no, agents should analyze change content before notifying product owners."},
  {id:"mon-7",cat:"monitoring",q:"For URL-based sources, the default timeout is 30 seconds. Should regulatory agency websites get longer timeouts?",type:"single_choice",opts:["30 seconds is fine for all","Government sites should get 60 seconds","Configurable per monitor in source_config","90 seconds for all (regulatory sites are slow)"],ctx:"timeout = config.get('timeout', 30) if config else 30",imp:"medium",hint:"Many regulatory agency websites are notoriously slow, especially EU portals"},
  {id:"mon-8",cat:"monitoring",q:"The Federal Register API fetches 20 documents per query. Is this sufficient to catch all relevant FDA changes?",type:"single_choice",opts:["20 is sufficient for daily checks","Should be 50","Should be 100","Should paginate through all results"],ctx:"params['per_page'] = 20 for Federal Register API",imp:"medium",hint:"If FDA publishes more than 20 relevant documents in a day, some could be missed"},
  {id:"mon-9",cat:"monitoring",q:"Should monitoring alerts be deduplicated across semantically similar (not just identical) changes?",type:"yes_no",ctx:"The system uses SHA-256 checksums for dedup, but semantically similar changes may still create duplicates.",imp:"high",hint:"If yes, apply semantic similarity dedup in addition to checksum dedup."},
  {id:"mon-10",cat:"monitoring",q:"Should the system detect when a regulatory source website completely changes its structure (redesign)?",type:"single_choice",opts:["No, let circuit breaker handle it","Yes, auto-pause after structure change detected","Flag for manual review","Auto-adjust selectors if possible"],ctx:"Circuit breaker opens after 5 errors but does not detect structural changes specifically",imp:"medium",hint:"A website redesign could cause continuous false-positive change detection"},

  // ══════════════════════════════════════════════════════════════════════════
  // IMPACT ANALYSIS — From impact_analysis_engine.py
  // ══════════════════════════════════════════════════════════════════════════
  {id:"imp-1",cat:"impact_analysis",q:"Base cost for testing is $15,000. Is this realistic for your industry and product types?",type:"single_choice",opts:["$15,000 is reasonable","Too low — should be $25,000-50,000","Too high — should be $5,000-10,000","Varies too much to have a single default"],ctx:"BASE_COSTS[TESTING] = 15000 USD in ImpactAnalysisEngine",imp:"high",hint:"EMC testing alone can cost $10,000-30,000 for complex electronic products"},
  {id:"imp-2",cat:"impact_analysis",q:"Base cost for product redesign is $50,000. How should this scale with product complexity?",type:"single_choice",opts:["$50,000 is a reasonable average","Should be $100,000+ for medical devices","Should scale with product category","Should scale with number of affected products"],ctx:"BASE_COSTS[REDESIGN] = 50000 USD",imp:"high",hint:"Redesigning a medical device vs a consumer electronic has vastly different costs"},
  {id:"imp-3",cat:"impact_analysis",q:"Base certification process timeline is 60 days. Is this realistic?",type:"single_choice",opts:["60 days is reasonable","Should be 90-120 days for most certifications","Should be 180 days for medical devices","Depends entirely on certification type"],ctx:"BASE_TIMELINES['certification_process'] = 60 days",imp:"high",hint:"Notified Body certification for EU MDR can take 6-18 months"},
  {id:"imp-4",cat:"impact_analysis",q:"Should impact analyses be auto-generated for ALL regulation changes, or only high-impact ones?",type:"single_choice",opts:["All changes","High-impact only","Product-linked changes only","Configurable per organization"],ctx:"auto-create-impact-analyses task runs at 5:20 AM for recent changes",imp:"critical",hint:"Automatic analysis ensures timely awareness but uses LLM resources"},
  {id:"imp-5",cat:"impact_analysis",q:"Does the same regulation change always have the same impact on different products?",type:"yes_no",ctx:"A regulation change might be critical for product A but irrelevant for product B.",imp:"critical",hint:"If no, create per-product impact analyses rather than one per regulation change."},
  {id:"imp-6",cat:"impact_analysis",q:"Should impact analysis include estimated revenue impact (potential market access loss) in addition to compliance costs?",type:"yes_no",ctx:"Current analysis covers costs and timelines but not revenue/market impact",imp:"high",hint:"Losing market access in the EU due to non-compliance has much larger financial impact than compliance costs"},
  {id:"imp-7",cat:"impact_analysis",q:"Cost estimates are in USD. Should the system support multiple currencies based on organization location?",type:"single_choice",opts:["USD only is fine","Support EUR and GBP","Support all major currencies","Organization chooses their currency"],ctx:"CostBreakdown has currency field but BASE_COSTS are all USD",imp:"medium",hint:"European organizations think in EUR, not USD"},
  {id:"imp-8",cat:"impact_analysis",q:"The documentation update timeline is 21 days. Should this include translation time for multi-market products?",type:"single_choice",opts:["21 days without translation","Should include translation (add 14 days per language)","Separate translation timeline","Organization configures translation overhead"],ctx:"BASE_TIMELINES['documentation_update'] = 21 days",imp:"medium",hint:"EU products may need documentation in 24+ languages"},
  {id:"imp-9",cat:"impact_analysis",q:"Should the system suggest specific actions based on impact analysis?",type:"yes_no",ctx:"Action suggestions help users respond faster but may be inaccurate for complex scenarios.",imp:"medium",hint:"If yes, generate recommended actions. If no, only provide analysis."},
  {id:"imp-10",cat:"impact_analysis",q:"Does geographic scope of a regulation change affect its impact severity?",type:"yes_no",ctx:"A change affecting all EU states has broader impact than one affecting a single country.",imp:"high",hint:"If yes, weight impact severity by the number of affected countries."},

  // ══════════════════════════════════════════════════════════════════════════
  // RISK ASSESSMENT
  // ══════════════════════════════════════════════════════════════════════════
  {id:"risk-1",cat:"risk",q:"Should expired certificates increase risk score even if the product has other valid certificates?",type:"yes_no",ctx:"A product may have multiple certificates. One expired cert does not necessarily mean non-compliance.",imp:"high",hint:"If yes, include expired certificates as a risk factor regardless."},
  {id:"risk-2",cat:"risk",q:"Should the risk heatmap weight recent changes more than old ones?",type:"yes_no",ctx:"Time-decay weighting makes the heatmap more relevant to current risk.",imp:"high",hint:"If yes, apply exponential decay to changes in risk scoring."},
  {id:"risk-3",cat:"risk",q:"Should predictive regulations (upcoming, not yet in force) affect current risk scores?",type:"yes_no",ctx:"Upcoming regulations are not yet in force but preparation time matters.",imp:"high",hint:"If yes, factor predicted regulations into forward-looking risk assessments."},
  {id:"risk-4",cat:"risk",q:"Is a product targeting 10 countries riskier than one targeting 1 country?",type:"yes_no",ctx:"More target countries = more regulatory exposure and compliance burden.",imp:"medium",hint:"If yes, factor geographic spread into product-level risk score."},
  {id:"risk-5",cat:"risk",q:"Should the impact analysis consider supply chain implications when a material or component regulation changes?",type:"yes_no",ctx:"Current impact analysis focuses on direct product compliance, not supply chain effects",imp:"high",hint:"REACH/RoHS changes often have cascade effects through the supply chain"},

  // ══════════════════════════════════════════════════════════════════════════
  // KNOWLEDGE GRAPH — From semantic_knowledge_graph_agent.py
  // ══════════════════════════════════════════════════════════════════════════
  {id:"kg-1",cat:"regulations",q:"The knowledge graph supports 3 entity types: legal_act, standard, product. Should it also include 'notified_body' and 'testing_lab'?",type:"single_choice",opts:["3 types are sufficient","Add notified_body","Add notified_body and testing_lab","Add all compliance ecosystem entities"],ctx:"ENTITY_TYPES = {'legal_act', 'standard', 'product'}",imp:"medium",hint:"Notified body assignments are critical for CE marking and MDR compliance"},
  {id:"kg-2",cat:"regulations",q:"Graph traversal defaults to max_depth=2. Is this sufficient for finding indirect regulatory relationships?",type:"single_choice",opts:["2 levels is sufficient","Should be 3 levels","Should be 4 levels","Configurable per query"],ctx:"find_related_entities max_depth=2",imp:"medium",hint:"EU regulations often have chains: Directive -> Harmonised Standard -> Technical Specification -> Product"},
  {id:"kg-3",cat:"regulations",q:"The 'conflicts_with' relationship is classified as 'high' severity in overlap detection. Should 'supersedes' also be high?",type:"single_choice",opts:["conflicts=high, supersedes=medium (current)","Both should be high","conflicts=critical, supersedes=high","Severity should consider the entities involved"],ctx:"severity = 'high' if relationship_type == 'conflicts_with' else 'medium'",imp:"medium",hint:"A superseded regulation still in use is a compliance risk similar to a conflict"},
  {id:"kg-4",cat:"regulations",q:"Should the knowledge graph support temporal relationships (e.g., 'Directive X supersedes Y as of 2025-01-01')?",type:"yes_no",ctx:"Relationships have no temporal dimension — they represent current state only",imp:"high",hint:"Regulatory transitions have specific dates; the graph should reflect when relationships change"},
  {id:"kg-5",cat:"regulations",q:"Should the knowledge graph treat expert answers as higher authority than AI-derived relationships?",type:"yes_no",ctx:"detected_by field tracks whether SemanticKnowledgeGraphAgent or other method created the relationship",imp:"critical",hint:"If yes, expert answers override AI-derived facts in the knowledge graph hierarchy."},

  // ══════════════════════════════════════════════════════════════════════════
  // NOTIFICATIONS & EMAIL — From notification_service.py,
  //   digest_email_service.py, compliance_entry_tasks.py email logic
  // ══════════════════════════════════════════════════════════════════════════
  {id:"notif-1",cat:"notifications",q:"Certificate expiry notification priority: <= 7 days = URGENT, <= 30 days = HIGH, > 30 days = MEDIUM. Are these thresholds correct?",type:"single_choice",opts:["Current thresholds are correct","<= 14 days = URGENT, <= 60 days = HIGH","<= 7 days = URGENT, <= 30 days = HIGH, <= 90 days = MEDIUM","Configurable per certificate type"],ctx:"notify_certificate_expiring: <=7 = URGENT, <=30 = HIGH, else = MEDIUM",imp:"high",hint:"Different certificate types have different renewal lead times"},
  {id:"notif-2",cat:"notifications",q:"Regulation update notifications are always HIGH priority. Should the priority depend on the regulation's impact level?",type:"single_choice",opts:["Always HIGH is correct","Map from regulation impact level","URGENT for critical/high, HIGH for medium, MEDIUM for low","Depends on number of affected products"],ctx:"notify_regulation_updated always uses NotificationPriority.HIGH",imp:"high",hint:"A minor clarification to a regulation does not warrant the same urgency as a major amendment"},
  {id:"notif-3",cat:"notifications",q:"When no specific notify_user_ids are set, emails go to org admins and owners only. Should other roles also receive them?",type:"single_choice",opts:["Only admin/owner is correct","Include compliance_manager role","Include all users with compliance permissions","Configurable per organization"],ctx:"Fallback: admin_users query filters role.in_(['admin', 'owner'])",imp:"high",hint:"Compliance managers may need notifications but not be org admins"},
  {id:"notif-4",cat:"notifications",q:"The email batch size defaults to 50 entries per run. Is this sufficient for organizations with many products?",type:"single_choice",opts:["50 is sufficient","Should be 100","Should be 200","Should be unlimited (process all pending)"],ctx:"send_compliance_entry_emails batch_size=50",imp:"medium",hint:"If 200 entries are created overnight, it takes 4 runs to send all emails"},
  {id:"notif-5",cat:"notifications",q:"Compliance entry notification message is truncated to 500 characters. Is this enough for detailed compliance issues?",type:"single_choice",opts:["500 characters is sufficient","Should be 1000 characters","Should be unlimited (full body)","Preview 200 characters with 'read more' link"],ctx:"if len(message) > 500: message = message[:497] + '...'",imp:"medium",hint:"Compliance issues often need detailed context for users to understand the required action"},
  {id:"notif-6",cat:"notifications",q:"When notify_user_ids is empty, the notification becomes org-wide. Should all users in the org see it?",type:"single_choice",opts:["Yes, all org users (current behavior)","Only users with compliance role/permission","Only admins and compliance managers","Based on notification type"],ctx:"org-wide notification created when user_id is None and no notify_user_ids",imp:"high",hint:"Org-wide notifications can be noisy for users not responsible for compliance"},
  {id:"notif-7",cat:"notifications",q:"Email digests support 'hourly' and 'daily' frequencies. Should 'weekly' also be an option?",type:"yes_no",ctx:"DigestEmailService supports frequency: 'hourly' or 'daily'",imp:"medium",hint:"Some users prefer weekly summaries to reduce email volume"},
  {id:"notif-8",cat:"notifications",q:"SLA breach notifications go to assignee and escalation user. Should there be additional escalation tiers?",type:"single_choice",opts:["Two-tier is sufficient","Add third tier (department head)","Add unlimited escalation levels","Configurable escalation chain per organization"],ctx:"notify_task_sla_breached notifies assignee_user_id and escalation_user_id",imp:"medium",hint:"Critical compliance tasks may need executive attention if SLA is significantly breached"},
  {id:"notif-9",cat:"notifications",q:"Notification dedup for batch creation uses a 24-hour window. Should recurring issues generate new notifications?",type:"single_choice",opts:["Yes, new notification every 24 hours (current)","No, one notification until the issue is resolved","Weekly reminders for unresolved issues","Escalating reminders (24h, 7d, 30d)"],ctx:"Notification.created_at >= datetime.now() - timedelta(hours=24) for batch dedup",imp:"medium",hint:"Daily duplicate notifications for the same unresolved issue create alert fatigue"},

  // ══════════════════════════════════════════════════════════════════════════
  // DASHBOARD WIDGETS — From dashboard_widgets_service.py
  // ══════════════════════════════════════════════════════════════════════════
  {id:"dash-1",cat:"dashboard",q:"The compliance score uses weighted components: certification=50%, validity=30%, tasks=20%. Are these weights correct?",type:"single_choice",opts:["50/30/20 is correct","Certification=40, Validity=40, Tasks=20","Certification=30, Validity=30, Tasks=40","Configurable per organization"],ctx:"weights = {'certification': 0.5, 'validity': 0.3, 'tasks': 0.2}",imp:"critical",hint:"These weights determine the overall compliance score — getting them wrong misleads leadership"},
  {id:"dash-2",cat:"dashboard",q:"The grading scale is: A >= 90, B >= 80, C >= 70, D >= 60, F < 60. Are these thresholds appropriate for compliance?",type:"single_choice",opts:["Current thresholds are appropriate","Should be stricter (A >= 95, B >= 85, etc.)","Should be more lenient (A >= 85, B >= 75, etc.)","Industry-specific thresholds"],ctx:"Grade thresholds: A=90+, B=80+, C=70+, D=60+, F=<60",imp:"high",hint:"In regulated industries, 80% compliance may not be acceptable"},
  {id:"dash-3",cat:"dashboard",q:"The health status thresholds are: >= 70 'healthy', >= 50 'warning', < 50 'critical'. Is 70% too low for 'healthy'?",type:"single_choice",opts:["70% is appropriate","Should be 80% for healthy","Should be 90% for healthy","Depends on industry (medical=90, consumer=70)"],ctx:"status: 'healthy' if overall_score >= 70 else ('warning' if >= 50 else 'critical')",imp:"high",hint:"For medical devices, anything below 95% compliance could be considered critical"},
  {id:"dash-4",cat:"dashboard",q:"The certificate validity score queries VALID certificates for both numerator and denominator, always producing 100%. Is this a bug?",type:"yes_no",ctx:"total_certs = count(status==VALID), valid_certs = count(status==VALID). Score = valid/total = always 100%",imp:"critical",hint:"This appears to be a bug — the validity score provides no useful information as implemented"},
  {id:"dash-5",cat:"dashboard",q:"When no tasks exist, the task score defaults to 100%. Should it instead show as 'N/A' or 0%?",type:"single_choice",opts:["100% is correct (no tasks = fully complete)","Should be 'N/A' / excluded from score","Should be 0% (need to create tasks)","Should not affect overall score"],ctx:"scores['tasks'] = 100 if total_tasks == 0 (also on exception)",imp:"high",hint:"Defaulting to 100% when no tasks exist inflates the overall compliance score"},
  {id:"dash-6",cat:"dashboard",q:"The product compliance overview considers >= 80% 'compliant', >= 50% 'partial', < 50% 'non_compliant'. Are these thresholds correct?",type:"single_choice",opts:["80/50 thresholds are correct","90/70 (stricter for regulated products)","85/60 (slightly stricter)","Configurable per product category"],ctx:"status: 'compliant' if compliance_rate >= 80 else ('partial' if >= 50 else 'non_compliant')",imp:"high",hint:"The threshold for 'compliant' determines which categories appear green on the dashboard"},
  {id:"dash-7",cat:"dashboard",q:"The trend calculation compares current certification score to 30 days ago. Should it use a longer comparison period?",type:"single_choice",opts:["30 days is appropriate","60 days for better trend visibility","90 days for quarterly view","Both 30-day and 90-day trends"],ctx:"config.include_trends with 30-day lookback for trend calculation",imp:"medium",hint:"30 days may be too short to show meaningful compliance trends"},

  // ══════════════════════════════════════════════════════════════════════════
  // HUB DOCUMENTS — From hub_document_sync_service.py
  // ══════════════════════════════════════════════════════════════════════════
  {id:"doc-1",cat:"documents",q:"The hub document sync is additive-only (never deletes). Should it mark hub documents as archived when the source record is deleted?",type:"single_choice",opts:["Additive-only is correct (current)","Mark as archived when source is deleted","Mark as archived when source is deactivated","Sync deletions as well"],ctx:"Existing tables remain unchanged. Hub documents are created/updated only",imp:"medium",hint:"Orphaned hub documents with deleted sources may confuse document management"},
  {id:"doc-2",cat:"documents",q:"All certificates are synced with is_required=True. Should some certificate types be optional?",type:"single_choice",opts:["All required (current behavior)","Only mandatory regulatory certs required","Organization configures which are required","Based on product target markets"],ctx:"is_required=True for all synced certificates",imp:"medium",hint:"Marking all certificates as required inflates the 'missing documents' count for audit readiness"},
  {id:"doc-3",cat:"documents",q:"The audit readiness check requires ALL required documents to be valid. Should it allow exceptions for documents in renewal?",type:"single_choice",opts:["Strict: all required must be valid (current)","Allow documents in active renewal process","Allow up to 1 expired if renewal is in progress","Configurable tolerance level"],ctx:"audit_ready = len(valid_required) == len(required_docs)",imp:"high",hint:"During normal operations, some documents may be in renewal — strict check may always show 'not ready'"},
  {id:"doc-4",cat:"documents",q:"Hub document sync creates renewals only for documents with future expiry dates. Should it also create renewals for recently expired documents?",type:"single_choice",opts:["Only future dates (current behavior)","Also for documents expired within 30 days","Also for all expired active documents","Configurable grace period"],ctx:"if cert.expiry_date and cert.expiry_date > date.today(): _create_renewal()",imp:"high",hint:"Documents that expired yesterday still need renewal tracking"},
  {id:"doc-5",cat:"documents",q:"The default expiring documents lookahead is 90 days. Should users be able to configure this?",type:"single_choice",opts:["90 days is sufficient for all","Should be configurable (30/60/90/180)","Different defaults per document type","Organization configures their lookahead"],ctx:"get_expiring_documents defaults to days=90",imp:"medium",hint:"Organizations with longer procurement cycles may need 180-day visibility"},

  // ══════════════════════════════════════════════════════════════════════════
  // GENERAL & BUSINESS DOMAIN
  // ══════════════════════════════════════════════════════════════════════════
  {id:"gen-1",cat:"general",q:"Is EU CE marking always required for products sold in EU member states?",type:"yes_no",ctx:"CE marking is required for many but not all product categories sold in the EU.",imp:"high",hint:"If no, check product category against the CE marking directive scope."},
  {id:"gen-2",cat:"general",q:"Can a product be sold in a country while compliance status is 'pending'?",type:"yes_no",ctx:"Some markets allow sales during compliance assessment, others require pre-approval.",imp:"high",hint:"If no, flag pending status as a market access blocker."},
  {id:"gen-3",cat:"general",q:"Is the compliance status of a product always binary (compliant/not) or can it be nuanced?",type:"single_choice",opts:["Binary","Nuanced/graduated"],ctx:"A nuanced approach allows partial, conditional, or provisional compliance statuses.",imp:"critical",hint:"If nuanced, support multiple compliance levels in all evaluations."},
  {id:"gen-4",cat:"general",q:"Should the system distinguish between 'legally required' and 'market-expected' compliance?",type:"yes_no",ctx:"Some standards are not legally required but are expected by customers or industry practice.",imp:"high",hint:"If yes, tag compliance requirements as mandatory vs. recommended."},
  {id:"gen-5",cat:"general",q:"Does a Declaration of Conformity always require an underlying certificate?",type:"yes_no",ctx:"DoC is a manufacturer's declaration. Some DoCs require third-party certification, others do not.",imp:"high",hint:"If no, accept DoC as standalone compliance evidence for applicable product types."},
  {id:"gen-6",cat:"general",q:"Is self-declaration of compliance ever sufficient without third-party certification?",type:"yes_no",ctx:"EU MDR requires notified body involvement, but EU LVD allows self-declaration for some products.",imp:"high",hint:"If yes, agents should check regulation requirements to determine if self-declaration is acceptable."},
  {id:"gen-7",cat:"general",q:"Should the system track version history of compliance evaluations?",type:"yes_no",ctx:"Version history helps with audit trails but increases storage and complexity.",imp:"medium",hint:"If yes, create versioned records of compliance evaluations."},
  {id:"gen-8",cat:"general",q:"Is the current approach of treating all EU member states identically correct, or should there be country-specific nuances?",type:"yes_no",ctx:"EU regulations apply uniformly, but national implementations can differ (e.g., different notified bodies).",imp:"high",hint:"If no, implement country-specific compliance layers on top of EU-wide regulations."},

  // ══════════════════════════════════════════════════════════════════════════
  // AI INTELLIGENCE — Challenge automation boundaries
  // ══════════════════════════════════════════════════════════════════════════
  {id:"adv-1",cat:"intelligence",q:"Should the AI auto-generate compliance entries without human approval when confidence is above 95%?",type:"yes_no",ctx:"Currently all entries are auto-created by scheduled tasks. Should there be a human-in-the-loop for high-confidence actions?",imp:"critical",hint:"Defines the automation boundary — full auto vs. human approval queue."},
  {id:"adv-2",cat:"intelligence",q:"Should the system learn from user corrections (e.g., when someone changes a compliance entry's severity)?",type:"yes_no",ctx:"If users frequently downgrade WARNING entries to INFO for a specific regulation type, the system could learn that pattern.",imp:"critical",hint:"If yes, implement feedback loop from user corrections into severity prediction."},
  {id:"adv-3",cat:"intelligence",q:"Should the system detect when two regulations in different countries conflict with each other?",type:"yes_no",ctx:"A product may face contradictory requirements (e.g., one country bans a material another requires).",imp:"critical",hint:"If yes, implement cross-jurisdiction conflict detection in the knowledge graph."},
  {id:"adv-4",cat:"intelligence",q:"Should compliance deadlines trigger automatic task creation for the responsible team?",type:"yes_no",ctx:"Currently entries exist but tasks are separate. Auto-linking would close the action gap.",imp:"high",hint:"If yes, wire compliance entries to auto-create tasks in the V2 task system."},
  {id:"adv-5",cat:"intelligence",q:"Should the AI explain WHY a product is non-compliant in natural language, not just show a status?",type:"yes_no",ctx:"'Non-compliant' is less actionable than 'Missing CE certificate required by EU MDR Annex II for Class IIa devices'.",imp:"critical",hint:"If yes, generate natural language compliance gap explanations for every status."},
  {id:"adv-6",cat:"intelligence",q:"Should the system predict which certifications a product will need BEFORE the user assigns target countries?",type:"yes_no",ctx:"Based on product category and similar products in the system, the AI could pre-populate requirements.",imp:"high",hint:"If yes, implement certification prediction in the onboarding/product creation flow."},
  {id:"adv-7",cat:"intelligence",q:"Should the system automatically detect when a user's evaluation contradicts the AI's assessment?",type:"yes_no",ctx:"If the AI says 'non-compliant' but the user marks it 'compliant', that disagreement should be flagged.",imp:"high",hint:"If yes, implement human-AI disagreement detection and escalation."},

  // ══════════════════════════════════════════════════════════════════════════
  // CHALLENGE CURRENT LOGIC
  // ══════════════════════════════════════════════════════════════════════════
  {id:"challenge-1",cat:"challenge",q:"Is the current severity model (CRITICAL/WARNING/TASK/INFO with fixed numbers 450/350/250/150) too rigid?",type:"yes_no",ctx:"The fixed severity numbers mean an OJ expiration is always more important than any regulation change, regardless of context.",imp:"critical",hint:"If yes, consider dynamic severity based on context (deadline proximity, product criticality, market size)."},
  {id:"challenge-2",cat:"challenge",q:"Should compliance status be calculated in real-time instead of relying on nightly batch jobs?",type:"yes_no",ctx:"Current system runs 20+ scheduled tasks between 1-9 AM. Status can be up to 24 hours stale.",imp:"critical",hint:"If yes, implement event-driven compliance recalculation on certificate/regulation changes."},
  {id:"challenge-3",cat:"challenge",q:"Is the MAX(severity) approach for the compliance map misleading? Would a weighted average be more informative?",type:"single_choice",opts:["MAX is correct","Weighted average is better","Show both"],ctx:"MAX(severity) means 1 WARNING out of 100 products makes a country yellow. A weighted view might be more nuanced.",imp:"critical",hint:"Directly affects how the compliance map visualization works."},
  {id:"challenge-4",cat:"challenge",q:"Should the system distinguish between 'regulatory compliance' and 'certification compliance'?",type:"yes_no",ctx:"Currently both are mixed into one status. A product might be regulation-aware but lack certificates.",imp:"high",hint:"If yes, split compliance into two dimensions: regulatory awareness + certification coverage."},
  {id:"challenge-5",cat:"challenge",q:"Is the current deduplication (SHA-256 checksum) catching enough duplicate entries?",type:"yes_no",ctx:"Checksums catch identical entries but miss semantically similar ones (same regulation, different wording).",imp:"high",hint:"If no, add semantic similarity matching as a second dedup layer."},

  // ══════════════════════════════════════════════════════════════════════════
  // BUSINESS STRATEGY
  // ══════════════════════════════════════════════════════════════════════════
  {id:"biz-1",cat:"strategy",q:"Should ProductLex recommend the optimal order to achieve compliance across multiple countries?",type:"yes_no",ctx:"If targeting 5 new markets, the system could suggest: 'Start with Germany (covers most EU), then UK, then US'.",imp:"critical",hint:"If yes, implement market entry sequencing optimization in the recommendation engine."},
  {id:"biz-2",cat:"strategy",q:"Should the system calculate the ROI of compliance investments?",type:"yes_no",ctx:"'Spending $50K on CE certification opens 27 EU markets worth $2M in revenue potential.'",imp:"high",hint:"If yes, integrate market size data with compliance cost estimation."},
  {id:"biz-3",cat:"strategy",q:"Is it valuable to show a 'time to compliance' estimate for each country/product combination?",type:"yes_no",ctx:"'Product X can be compliant in Germany in ~3 months, in Japan in ~8 months.'",imp:"high",hint:"If yes, implement timeline estimation based on certification type and historical data."},
  {id:"biz-4",cat:"strategy",q:"Should the system track total 'compliance debt' — the accumulated cost of all outstanding compliance gaps?",type:"yes_no",ctx:"Like technical debt, compliance debt grows over time and becomes more expensive to fix.",imp:"high",hint:"If yes, calculate and display aggregate compliance debt per organization."},
  {id:"biz-5",cat:"strategy",q:"Should ProductLex suggest which certifications to get first based on market access value?",type:"yes_no",ctx:"Some certifications unlock multiple markets (e.g., CE marking = 27 EU countries + EEA).",imp:"high",hint:"If yes, implement certification ROI ranking in the recommendation engine."},
  {id:"biz-6",cat:"strategy",q:"Should the system generate executive-ready compliance reports automatically?",type:"yes_no",ctx:"Monthly board reports showing compliance posture, risks, costs, and progress.",imp:"high",hint:"If yes, implement scheduled PDF report generation for executive summaries."},

  // ══════════════════════════════════════════════════════════════════════════
  // CERTIFICATES — Additional questions (cert-21 to cert-40)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"cert-21",cat:"certificates",q:"Should the system distinguish between mandatory certifications (legally required) and voluntary certifications (nice-to-have)?",type:"yes_no",ctx:"CE marking is mandatory for certain products; ISO 14001 is voluntary but market-expected.",imp:"critical",hint:"If yes, only mandatory certs should affect compliance status; voluntary certs add extra credit."},
  {id:"cert-22",cat:"certificates",q:"When a notified body loses its accreditation, should all certificates issued by that body be flagged?",type:"single_choice",opts:["Yes, flag all certificates immediately","Only flag certificates up for renewal","Only notify the organization","Depends on the reason for de-accreditation"],ctx:"Notified body accreditation changes can invalidate the legal basis of certificates they issued.",imp:"critical",hint:"EU regulation requires certificates to be issued by accredited bodies — de-accreditation has cascading effects."},
  {id:"cert-23",cat:"certificates",q:"Should the certificate expiration task check only VALID-status certificates, or also PENDING ones?",type:"single_choice",opts:["Only VALID (current behavior)","VALID and PENDING","All non-revoked statuses","Configurable per organization"],ctx:"create_expired_certificate_entries filters Certificate.status == CertificateStatus.VALID",imp:"medium",hint:"A PENDING certificate with an expiry date is unusual but could exist for pre-approved renewals."},
  {id:"cert-24",cat:"certificates",q:"Should certificates have a 'scope' field that defines which product features or variants they cover?",type:"yes_no",ctx:"A CE certificate may cover only specific voltage ranges or operating conditions of a product.",imp:"high",hint:"If yes, compliance checking should verify that the certificate scope matches the product configuration."},
  {id:"cert-25",cat:"certificates",q:"The certificate model stores geographic_coverage in cert_metadata JSON. Should this be a first-class queryable field?",type:"single_choice",opts:["JSON metadata is sufficient","Promote to a proper column","Create a junction table (certificate_countries)","Both column and metadata"],ctx:"cert_metadata example: {'geographic_coverage': ['EU', 'UK']}. JSON fields cannot drive SQL-based compliance map queries efficiently.",imp:"high",hint:"Country-level certificate queries are needed for per-country compliance status on the map."},
  {id:"cert-26",cat:"certificates",q:"Should the system track which specific standard version a certificate was tested against?",type:"yes_no",ctx:"A certificate tested against EN 60601-1:2006 may not be valid under EN 60601-1:2012.",imp:"critical",hint:"If yes, standard version tracking enables automatic flagging when a referenced standard is superseded."},
