  {id:"cert-27",cat:"certificates",q:"For the CLE-990 task linking feature, should certificate auto-update also change the status to EXPIRED when all linked tasks fail?",type:"yes_no",ctx:"auto_update_on_completion=True triggers status change when all tasks complete, but no logic for task failure.",imp:"medium",hint:"Task failures might indicate the certificate renewal process has stalled."},
  {id:"cert-28",cat:"certificates",q:"Should there be different expiration warning cadences for different certificate types?",type:"single_choice",opts:["Same cadence for all (7/28/90 days)","CE/UKCA: 90/180/365 days","Medical device: 180/365 days","Configurable per certificate type"],ctx:"Thresholds: (7, INFO), (28, INFO), (90, INFO) — same for all certificate types.",imp:"high",hint:"Medical device re-certification can take 6-18 months; 90-day warning may be too late."},
  {id:"cert-29",cat:"certificates",q:"Should the system enforce that a certificate cannot be marked VALID unless all required fields are populated?",type:"yes_no",ctx:"Certificate model has nullable fields (description, file_path, notes) that could be incomplete.",imp:"medium",hint:"If yes, implement validation rules before allowing VALID status transitions."},
  {id:"cert-30",cat:"certificates",q:"When the hub document sync creates renewals, it only does so for future-dated certificates. Should it handle recently-expired ones too?",type:"single_choice",opts:["Only future dates (current)","Include expired within 30 days","Include expired within 90 days","Include all expired active certificates"],ctx:"if cert.expiry_date and cert.expiry_date > date.today(): _create_renewal()",imp:"high",hint:"A certificate that expired yesterday still needs a renewal workflow created."},
  {id:"cert-31",cat:"certificates",q:"Should the system support certificate chains (e.g., test report -> certification -> declaration of conformity)?",type:"yes_no",ctx:"In practice, a test report is a prerequisite for certification, which enables the DoC.",imp:"high",hint:"If yes, model parent-child relationships between certificates for dependency tracking."},
  {id:"cert-32",cat:"certificates",q:"Should expired certificates be automatically excluded from compliance score calculations?",type:"single_choice",opts:["Yes, exclude expired (current implicit behavior)","Count as negative (penalize)","Count as partial credit if recently expired","Depends on grace period"],ctx:"Dashboard counts products with VALID certificates as certified. Expired certs are simply not counted.",imp:"high",hint:"Not counting expired certs is neutral; penalizing them would more aggressively surface issues."},
  {id:"cert-33",cat:"certificates",q:"Should certificate file_path be validated to ensure the actual document is accessible?",type:"yes_no",ctx:"Certificate.file_path stores a path to the PDF but there is no validation that the file exists.",imp:"medium",hint:"If yes, implement periodic file existence checks and flag certificates with missing documents."},
  {id:"cert-34",cat:"certificates",q:"For audit readiness, should the system require both a valid certificate AND an uploaded document file?",type:"single_choice",opts:["Valid status is sufficient","Require file upload for audit readiness","Require file upload only for mandatory certs","Organization configures their requirements"],ctx:"audit_ready checks valid_required vs required_docs counts but does not verify file_path is populated.",imp:"high",hint:"During audits, inspectors need to see the actual certificate document, not just a database record."},
  {id:"cert-35",cat:"certificates",q:"Should the completion_percentage on certificates update in real-time as tasks are completed, or on a schedule?",type:"single_choice",opts:["Real-time on task status change","Hourly batch update","Daily batch update","On certificate view/access"],ctx:"completion_percentage and completed_tasks_count exist on Certificate but update mechanism is unclear.",imp:"medium",hint:"Real-time updates provide better UX but require event-driven architecture."},
  {id:"cert-36",cat:"certificates",q:"Should certificates issued in one country be recognized as valid in another (mutual recognition)?",type:"single_choice",opts:["Never — each country needs its own cert","Follow mutual recognition agreements (MRAs)","Organization configures recognition rules","AI should suggest based on regulatory analysis"],ctx:"EU-US MRA covers some product categories. Not all certifications are mutually recognized.",imp:"high",hint:"Mutual recognition can significantly reduce compliance burden but varies by product category."},
  {id:"cert-37",cat:"certificates",q:"Should the system warn when a product's certificate was issued more than a certain number of years ago?",type:"single_choice",opts:["No, only check expiry date","Warn after 3 years regardless of expiry","Warn after 5 years","Depends on certificate type"],ctx:"Some certificates have no expiry date but may become outdated as standards evolve.",imp:"medium",hint:"A non-expiring certificate from 2015 may reference obsolete standards."},
  {id:"cert-38",cat:"certificates",q:"The 17 certificate types in CERTIFICATE_TYPE_MAPPING — are there additional types your organization uses?",type:"single_choice",opts:["The 17 types cover our needs","Need to add medical device specific types (MDR, IVDR)","Need to add automotive (E-mark, UNECE)","Need a custom/other category"],ctx:"CERTIFICATE_TYPE_MAPPING maps 17 types: CE, UKCA, FCC, UL, ISO variants, RoHS, REACH, WEEE.",imp:"medium",hint:"Missing certificate types would not sync correctly to hub documents."},
  {id:"cert-39",cat:"certificates",q:"Should certificate status history be used to detect patterns (e.g., certificates that are frequently revoked and reissued)?",type:"yes_no",ctx:"CertificateStatusHistory model tracks all status changes with timestamps.",imp:"medium",hint:"If yes, pattern detection could flag unreliable notified bodies or problematic product lines."},
  {id:"cert-40",cat:"certificates",q:"When multiple certificates of different types exist for the same product-market combination, should the system show the most restrictive status?",type:"single_choice",opts:["Most restrictive (worst status wins)","Best status wins (any valid = ok)","Show each certificate type separately","Weighted by certificate importance"],ctx:"A product targeting EU might have CE + RoHS + EMC certificates, each with different status.",imp:"critical",hint:"Determines how multi-certificate compliance is displayed on the dashboard and map."},

  // ══════════════════════════════════════════════════════════════════════════
  // RISK ASSESSMENT — Additional questions (risk-6 to risk-40)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"risk-6",cat:"risk",q:"The impact analysis engine uses severity_factor multipliers: critical=2.0, high=1.5, medium=1.0, low=0.7. Are these appropriate?",type:"single_choice",opts:["Current multipliers are appropriate","Critical should be 3.0 (more weight)","Low should be 0.5 (less weight)","Should vary by industry"],ctx:"_get_severity_factor maps severity strings to float multipliers for cost/timeline scaling.",imp:"high",hint:"These multipliers directly scale cost estimates — incorrect values mislead budget planning."},
  {id:"risk-7",cat:"risk",q:"Cost-based severity thresholds: >$200K=CRITICAL, >$100K=HIGH, >$50K=MEDIUM. Are these appropriate for your organization?",type:"single_choice",opts:["Current thresholds are appropriate","Too high — lower by 50%","Too low — double them","Should be configurable per organization"],ctx:"_calculate_severity: total_cost > 200000 => 4, > 100000 => 3, > 50000 => 2, else 1",imp:"high",hint:"A $200K threshold may be critical for a startup but routine for a multinational."},
  {id:"risk-8",cat:"risk",q:"The risk score calculation uses severity weights: CRITICAL=25, HIGH=18, MEDIUM=10, LOW=5, MINIMAL=2. Are these balanced?",type:"single_choice",opts:["Current weights are balanced","CRITICAL should be higher (30+)","Gap between HIGH and MEDIUM is too large","Weights should be configurable"],ctx:"severity_weights in _calculate_risk_score used to compute weighted risk score 0-100",imp:"medium",hint:"These weights determine the 0-100 risk score that drives the risk heatmap layer."},
  {id:"risk-9",cat:"risk",q:"When no risk factors are identified, the default risk score is 20. Should it be 0 instead?",type:"single_choice",opts:["20 is correct (nothing is truly zero risk)","Should be 0 (no identified risks = no risk)","Should be 10 (minimal baseline)","Should be 50 (uncertain = moderate risk)"],ctx:"_calculate_risk_score returns 20 if not risks",imp:"medium",hint:"A baseline risk of 20 means no product ever shows as zero-risk, which may or may not be correct."},
  {id:"risk-10",cat:"risk",q:"Should risk scores decay over time if no new regulatory changes affect a product?",type:"yes_no",ctx:"Current risk scores are static snapshots calculated at analysis time.",imp:"medium",hint:"If yes, implement time-decay so risk scores decrease as regulatory environment stabilizes."},
  {id:"risk-11",cat:"risk",q:"Should the risk velocity layer threshold (3/6 changes per period) be configurable?",type:"single_choice",opts:["3/6 is appropriate","Should be 2/4 (more sensitive)","Should be 5/10 (less sensitive)","Configurable per organization"],ctx:"getLayerColor for 'velocity': <=3 green, <=6 orange, >6 red",imp:"medium",hint:"The velocity layer shows how rapidly changes are occurring — thresholds affect sensitivity."},
  {id:"risk-12",cat:"risk",q:"Should risk assessment consider the number of countries a product targets?",type:"single_choice",opts:["Yes, more countries = higher risk","Only if countries have conflicting requirements","Weight by market size, not count","No, each country assessed independently"],ctx:"Risk factors include product count but not geographic spread.",imp:"high",hint:"A product in 20 countries faces more regulatory change exposure than one in 2."},
  {id:"risk-13",cat:"risk",q:"The resource constraint risk triggers when product_count > 5. Is 5 the right threshold?",type:"single_choice",opts:["5 is appropriate","Should be 3 (trigger earlier)","Should be 10 (trigger later)","Should be based on team size, not product count"],ctx:"if product_count > 5: risks.append(RiskFactor('Resource Constraints', MEDIUM, 0.6, ...))",imp:"medium",hint:"An organization with 3 products and 1 compliance person is more constrained than one with 10 products and 20 staff."},
  {id:"risk-14",cat:"risk",q:"Should historical compliance failures increase a product's current risk score?",type:"yes_no",ctx:"Risk assessment only considers current state, not past compliance issues.",imp:"high",hint:"If yes, products with repeated compliance failures should have elevated baseline risk."},
  {id:"risk-15",cat:"risk",q:"Should the system calculate aggregate portfolio risk across all products?",type:"yes_no",ctx:"Current risk assessment is per-product or per-regulation-change, not portfolio-wide.",imp:"high",hint:"If yes, implement portfolio risk aggregation showing overall organizational exposure."},
  {id:"risk-16",cat:"risk",q:"Should product category affect the baseline risk score?",type:"single_choice",opts:["No, all categories equal","Medical devices start higher","Consumer products for children start higher","Organization defines category risk levels"],ctx:"Risk assessment does not factor in product category — medical devices treated same as toys.",imp:"critical",hint:"Regulatory risk for Class III medical devices is fundamentally different from low-voltage consumer electronics."},
  {id:"risk-17",cat:"risk",q:"Should the system track 'regulatory change velocity' per country to predict future risk?",type:"yes_no",ctx:"Countries with frequent regulatory changes (e.g., EU AI Act rollout) pose higher future risk.",imp:"medium",hint:"If yes, build a regulatory change frequency index per jurisdiction."},
  {id:"risk-18",cat:"risk",q:"Should the risk heatmap show predicted future risk or only current assessed risk?",type:"single_choice",opts:["Current risk only","Include predicted risk (next 6 months)","Show both current and predicted","User toggles between current and predicted"],ctx:"Risk heatmap shows static risk scores without forward-looking component.",imp:"high",hint:"Forward-looking risk helps organizations prepare, but predictions may be inaccurate."},
  {id:"risk-19",cat:"risk",q:"Should risk scoring account for whether a product has active monitoring set up?",type:"yes_no",ctx:"A product with active regulatory monitors is better prepared for changes.",imp:"medium",hint:"If yes, reduce risk score for products with comprehensive monitoring coverage."},
  {id:"risk-20",cat:"risk",q:"The timeline risk factor triggers when severity_factor > 1.5. Should it also consider the actual deadline date?",type:"single_choice",opts:["Severity factor alone is sufficient","Also consider deadline proximity","Only deadline proximity matters","Both factors with different weights"],ctx:"Timeline risk: probability=0.7 if severity_factor > 1.5, regardless of deadline.",imp:"high",hint:"A high-severity change with a 2-year transition period is less risky than one with 3 months."},
  {id:"risk-21",cat:"risk",q:"Should the system distinguish between compliance risk and safety risk?",type:"yes_no",ctx:"Compliance risk = regulatory penalty. Safety risk = harm to users. These can differ.",imp:"critical",hint:"If yes, implement dual risk dimensions to prioritize safety-critical issues."},
  {id:"risk-22",cat:"risk",q:"Should products with no applicable regulations have a risk score?",type:"single_choice",opts:["Zero risk (no regulations = no risk)","Low risk (regulations may not be identified yet)","Medium risk (unmapped regulatory landscape)","Depends on product category"],ctx:"Products without ProductRegulation entries have no risk assessment.",imp:"high",hint:"Absence of identified regulations does not mean absence of regulatory obligations."},
  {id:"risk-23",cat:"risk",q:"Should the risk score be weighted by the financial impact of losing market access?",type:"yes_no",ctx:"Losing access to a $500M market is more impactful than losing a $1M market.",imp:"high",hint:"If yes, integrate market size data into risk weighting for more business-relevant scores."},
  {id:"risk-24",cat:"risk",q:"Should the system identify 'single points of failure' in compliance (e.g., one certificate covering all products)?",type:"yes_no",ctx:"If one certificate expires and covers 50 products, the risk is concentrated.",imp:"critical",hint:"If yes, implement concentration risk detection for certificates, notified bodies, and testing labs."},
  {id:"risk-25",cat:"risk",q:"The economies-of-scale cost multiplier is max(1, product_count * 0.7). Is 0.7 the right factor?",type:"single_choice",opts:["0.7 is reasonable","Should be 0.5 (more economies)","Should be 0.9 (less economies)","Should vary by cost category"],ctx:"product_multiplier = max(1, product_count * 0.7) in _calculate_costs",imp:"medium",hint:"Testing 10 products is not 10x the cost of testing 1 — but how much cheaper per unit?"},
  {id:"risk-26",cat:"risk",q:"Should the system calculate 'time to non-compliance' for each product-regulation pair?",type:"yes_no",ctx:"If a transition period is ending or a certificate is expiring, time-to-non-compliance matters.",imp:"high",hint:"If yes, show a countdown to the date when the product becomes non-compliant."},
  {id:"risk-27",cat:"risk",q:"Should market access risk be shown on the compliance map as a separate layer?",type:"yes_no",ctx:"Current layers: compliance status, risk score, cert expiry, velocity. No market access layer.",imp:"medium",hint:"If yes, add a layer showing which products could lose market access and when."},
  {id:"risk-28",cat:"risk",q:"The certification delay risk probability is 0.4. Is this realistic for your experience?",type:"single_choice",opts:["0.4 is realistic","Higher — 0.6 (delays are common)","Lower — 0.2 (rarely delayed)","Depends on notified body and product type"],ctx:"RiskFactor('Certification Delays', HIGH, probability=0.4, ...)",imp:"medium",hint:"Certification delays depend heavily on which notified body and the complexity of the product."},
  {id:"risk-29",cat:"risk",q:"Should risk assessments be versioned so you can compare risk over time?",type:"yes_no",ctx:"Current analysis creates a single snapshot per regulation change. No trend tracking.",imp:"medium",hint:"If yes, store periodic risk snapshots and show risk trend charts on the dashboard."},
  {id:"risk-30",cat:"risk",q:"Should the system flag when a product's risk score crosses a threshold (e.g., moves from green to orange)?",type:"yes_no",ctx:"Risk scores are calculated but there are no threshold-crossing alerts.",imp:"high",hint:"If yes, create compliance entries or notifications when risk thresholds are crossed."},
  {id:"risk-31",cat:"risk",q:"Should regulatory fees ($3,000 base per product) vary by jurisdiction?",type:"single_choice",opts:["$3,000 flat rate is fine","EU should be higher (complex process)","US FDA fees are much higher ($5,000-$100,000+)","Use actual fee schedules per jurisdiction"],ctx:"BASE_COSTS[REGULATORY_FEES] = 3000 per product",imp:"medium",hint:"FDA 510(k) user fees alone are ~$21,000; EU MDR NB fees vary widely."},
  {id:"risk-32",cat:"risk",q:"Should the legal compliance cost estimate ($10,000) scale with jurisdiction complexity?",type:"single_choice",opts:["$10,000 flat is sufficient","Scale by number of jurisdictions","Scale by regulation complexity","Replace with configurable per-regulation costs"],ctx:"BASE_COSTS[LEGAL_COMPLIANCE] = 10000",imp:"medium",hint:"Legal costs for multi-jurisdictional compliance can easily exceed $100K."},
  {id:"risk-33",cat:"risk",q:"Should production changes cost ($35,000) factor in whether the product is already in mass production?",type:"yes_no",ctx:"BASE_COSTS[PRODUCTION_CHANGES] = 35000 regardless of production status.",imp:"medium",hint:"Changing a product already in production is far more expensive than one still in prototype."},
  {id:"risk-34",cat:"risk",q:"The gap analysis timeline scales as: 14 days * min(1.0 + product_count * 0.1, 2.0). Is the 2x cap appropriate?",type:"single_choice",opts:["2x cap is appropriate","Should cap at 3x for large portfolios","Should not cap — scale linearly","Should be based on regulation complexity, not product count"],ctx:"gap_days = BASE_TIMELINES['gap_analysis'] * min(1.0 + (product_count * 0.1), 2.0)",imp:"medium",hint:"10+ products cap at 28 days for gap analysis; is that enough for 50 products?"},
  {id:"risk-35",cat:"risk",q:"Should design changes timeline (45 days * severity_factor) include hardware vs software distinction?",type:"single_choice",opts:["45 days base is fine for both","Software changes: 21 days, Hardware: 60 days","Add a product_type multiplier","Organization provides their own estimates"],ctx:"BASE_TIMELINES['design_changes'] = 45 days",imp:"medium",hint:"A firmware update is fundamentally different from a hardware redesign."},

  // ══════════════════════════════════════════════════════════════════════════
  // DOCUMENTS — Additional questions (doc-6 to doc-35)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"doc-6",cat:"documents",q:"Should the hub document sync distinguish between 'required for compliance' and 'required for audit' documents?",type:"yes_no",ctx:"All synced certificates have is_required=True. In practice, some are compliance-required and some are audit-required.",imp:"high",hint:"If yes, add a requirement_type field to distinguish between compliance and audit requirements."},
  {id:"doc-7",cat:"documents",q:"The CERTIFICATE_TYPE_MAPPING has 17 entries. Should unmapped certificate types default to a generic subtype or be flagged?",type:"single_choice",opts:["Default to generic subtype","Flag for manual classification","Skip unmapped types","Create a new subtype dynamically"],ctx:"cert_type_lower not in CERTIFICATE_TYPE_MAPPING results in document_subtype = None",imp:"medium",hint:"Unmapped certificate types will have NULL subtype in hub documents, making them harder to filter."},
  {id:"doc-8",cat:"documents",q:"Should test reports be synced with their test results and pass/fail status?",type:"yes_no",ctx:"Test report sync copies metadata but does not sync individual test results within the report.",imp:"medium",hint:"If yes, test result details enable richer compliance analysis at the requirement level."},
  {id:"doc-9",cat:"documents",q:"Should document version control be enforced (prevent uploading a new version without archiving the old one)?",type:"single_choice",opts:["No version control needed","Version control for certificates only","Version control for all documents","Configurable per document type"],ctx:"Hub documents support source_id linking but no explicit version chain.",imp:"high",hint:"For audit trails, version control ensures the history of compliance documents is maintained."},
  {id:"doc-10",cat:"documents",q:"Should the system prevent marking a document as 'active' if its valid_until date has passed?",type:"yes_no",ctx:"Document status is manually set and not automatically validated against valid_until.",imp:"medium",hint:"If yes, implement automatic status validation to prevent contradictory states."},
  {id:"doc-11",cat:"documents",q:"The hub document sync runs at 5:00 AM UTC. Is this frequency sufficient?",type:"single_choice",opts:["Daily is sufficient","Should be twice daily","Should be triggered on source changes","Should be hourly"],ctx:"sync-hub-documents runs at 5:00 AM as a Celery beat task.",imp:"medium",hint:"If a certificate is renewed at 10 AM, it won't be reflected in hub documents until 5 AM next day."},
  {id:"doc-12",cat:"documents",q:"Should the system track which user uploaded or modified each document?",type:"yes_no",ctx:"Hub documents track created_at and updated_at but not created_by or updated_by.",imp:"high",hint:"If yes, add user tracking for audit trail compliance (ISO 13485, FDA 21 CFR Part 11)."},
  {id:"doc-13",cat:"documents",q:"For ISO certificates mapped to ORGANIZATION scope, should they still be linked to specific products?",type:"single_choice",opts:["Organization scope only (current)","Link to all products in the org","Link to products in the certified scope","Both org-level and product-level links"],ctx:"ISO certificates get scope_level = ORGANIZATION. Product link is optional.",imp:"medium",hint:"ISO 13485 covers all products in the QMS scope; linking helps per-product compliance checks."},
  {id:"doc-14",cat:"documents",q:"Should the document expiration entry task (6:00 AM) also check hub documents, not just the Document model?",type:"single_choice",opts:["Document model only (current)","Hub documents only","Both models with dedup","Migrate to hub documents exclusively"],ctx:"create_document_expiration_entries checks Document.valid_until, not HubDocument.valid_until.",imp:"high",hint:"If hub documents are the unified document layer, expiration checks should use them."},
  {id:"doc-15",cat:"documents",q:"Should the system automatically request document renewals from external parties (e.g., notified bodies)?",type:"yes_no",ctx:"Renewals are tracked internally but no outbound communication is generated.",imp:"medium",hint:"If yes, implement automated renewal request emails or API integrations with certification bodies."},
  {id:"doc-16",cat:"documents",q:"For the document type mapping, should GUIDELINE documents map to PROCEDURE or get their own type?",type:"single_choice",opts:["Map to PROCEDURE (current)","Create a GUIDELINE hub type","Map to REGULATORY","Depends on the guideline source"],ctx:"DOCUMENT_TYPE_MAPPING: GUIDELINE -> PROCEDURE",imp:"medium",hint:"EU Commission guidelines are different from internal procedures in nature and use."},
  {id:"doc-17",cat:"documents",q:"Should hub documents support document templates (e.g., DoC template, technical file template)?",type:"yes_no",ctx:"Hub documents are records of existing documents, not templates for creating new ones.",imp:"medium",hint:"If yes, templates would help organizations create compliant documents from scratch."},
  {id:"doc-18",cat:"documents",q:"Should the system flag when a document references a superseded standard version?",type:"yes_no",ctx:"Documents may reference specific standard versions that have since been updated.",imp:"high",hint:"If yes, cross-reference document metadata against the knowledge graph's supersedes relationships."},
  {id:"doc-19",cat:"documents",q:"The expiring-documents lookahead checks documents expired in the last 90 days. Should it also check very old expired documents?",type:"single_choice",opts:["90 days is sufficient cutoff","Check all expired regardless of age","180 days","30 days (older ones are lost causes)"],ctx:"Document.valid_until >= today - timedelta(days=90) for expired document check",imp:"medium",hint:"Very old expired documents may indicate systemic document management issues."},
  {id:"doc-20",cat:"documents",q:"Should hub document links track the relationship type (e.g., 'proves compliance with', 'supports', 'required for')?",type:"yes_no",ctx:"HubDocumentLink connects documents to products but with no relationship metadata.",imp:"medium",hint:"If yes, relationship types enable better document gap analysis per compliance requirement."},
  {id:"doc-21",cat:"documents",q:"Should the system support multi-language document variants?",type:"single_choice",opts:["No, single language per document","Track language as metadata","Support linked translations","Organization configures required languages"],ctx:"No language field on hub documents or certificates.",imp:"high",hint:"EU requires user documentation in the language of the target market country."},
  {id:"doc-22",cat:"documents",q:"Should revoked certificates be synced to hub documents with ARCHIVED status, or excluded entirely?",type:"single_choice",opts:["Sync as ARCHIVED (current behavior)","Exclude from sync entirely","Sync with a special REVOKED status","Keep for audit history only"],ctx:"CertificateStatus.REVOKED maps to HubDocumentStatus.ARCHIVED",imp:"medium",hint:"Archiving revoked certificates preserves audit history but may confuse document counts."},
  {id:"doc-23",cat:"documents",q:"Should document compliance entries be separate from certificate compliance entries, or unified?",type:"single_choice",opts:["Separate entry types (current)","Unified under DOCUMENT_EXPIRATION","Separate with cross-references","Configurable per organization"],ctx:"ComplianceEntryType has both CERTIFICATE_EXPIRATION and DOCUMENT_EXPIRATION as separate values.",imp:"medium",hint:"From a user perspective, expired certificates and expired documents may need different workflows."},
  {id:"doc-24",cat:"documents",q:"Should the system enforce a maximum age for test reports (e.g., test reports older than 5 years are flagged)?",type:"single_choice",opts:["No maximum age","Flag after 3 years","Flag after 5 years","Based on referenced standard version lifecycle"],ctx:"Test reports have no age-based validity check — only explicit valid_until dates.",imp:"high",hint:"Some standards require testing to be performed within a specific timeframe of the product release."},
  {id:"doc-25",cat:"documents",q:"Should the incremental sync use updated_at or a dedicated sync_cursor timestamp?",type:"single_choice",opts:["updated_at is sufficient","Dedicated sync_cursor column","Both for reliability","Event-driven sync instead of timestamp"],ctx:"sync_incremental(since=datetime) uses Certificate.updated_at >= since.",imp:"medium",hint:"If updated_at is modified for non-content reasons, the sync may process unnecessary records."},
  {id:"doc-26",cat:"documents",q:"For the 7 test type mappings (EMC, safety, chemical, etc.), are there missing test types for your products?",type:"single_choice",opts:["7 types cover our needs","Need biocompatibility testing","Need wireless/RF testing","Need multiple additional types"],ctx:"TEST_TYPE_MAPPING maps 7 types: emc, safety, chemical, environmental, performance, reliability, flammability.",imp:"medium",hint:"Missing test types will not sync correctly to hub documents with proper subtypes."},
  {id:"doc-27",cat:"documents",q:"Should document renewals be automatically escalated if not addressed within a certain period?",type:"single_choice",opts:["No auto-escalation","Escalate after 30 days","Escalate after 60 days","Based on document criticality"],ctx:"HubDocumentRenewal tracks status but has no escalation mechanism.",imp:"high",hint:"Unaddressed renewals could lead to compliance gaps if they remain in pending status too long."},
  {id:"doc-28",cat:"documents",q:"Should the system support digital signatures or e-signatures on compliance documents?",type:"yes_no",ctx:"No digital signature support exists. Documents are uploaded as files without integrity verification.",imp:"high",hint:"If yes, implement signature verification for FDA 21 CFR Part 11 and EU MDR compliance."},
  {id:"doc-29",cat:"documents",q:"Should document access be restricted based on user role (e.g., only compliance managers can view certificates)?",type:"single_choice",opts:["All org users can view all documents","Role-based access control","Document-level permissions","Organization configures access policies"],ctx:"No document-level access control — all org users can see all documents.",imp:"medium",hint:"Sensitive compliance documents may need restricted access for regulatory or IP reasons."},
  {id:"doc-30",cat:"documents",q:"For the 12 document type mappings, should CORRESPONDENCE documents be treated differently from other compliance documents?",type:"yes_no",ctx:"DocumentType.CORRESPONDENCE -> HubDocumentType.CORRESPONDENCE. These include emails with regulators.",imp:"medium",hint:"Correspondence with regulatory bodies may be critical for compliance history but is not a compliance document per se."},

  // ══════════════════════════════════════════════════════════════════════════
  // NOTIFICATIONS — Additional questions (notif-10 to notif-35)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"notif-10",cat:"notifications",q:"Should notification priority automatically escalate if the issue is not resolved within a timeframe?",type:"single_choice",opts:["No auto-escalation","Escalate after 7 days","Escalate after 14 days","Based on entry severity"],ctx:"Notification priority is set at creation and never changes.",imp:"high",hint:"An unresolved HIGH notification for 30 days may need to become URGENT."},
  {id:"notif-11",cat:"notifications",q:"Should the system support notification preferences per user (e.g., 'only notify me about URGENT and HIGH')?",type:"single_choice",opts:["All notifications for all users","User sets minimum priority level","User selects notification types","Full customization (type + priority + frequency)"],ctx:"All users in the notification target receive all notification types.",imp:"high",hint:"Notification fatigue reduces effectiveness — users should control what they see."},
  {id:"notif-12",cat:"notifications",q:"Product creation notifications have LOW priority. Should they be sent at all?",type:"single_choice",opts:["Yes, keep as LOW (current)","Remove product creation notifications","Only notify if product needs compliance setup","Make configurable per organization"],ctx:"notify_product_created uses NotificationPriority.LOW",imp:"medium",hint:"Low-priority product creation notifications may just add noise for compliance teams."},
  {id:"notif-13",cat:"notifications",q:"Standard update notifications always use HIGH priority. Should they vary based on the update's significance?",type:"single_choice",opts:["Always HIGH (current)","Based on standard change scope","Based on number of affected products","LOW for editorial, HIGH for technical changes"],ctx:"notify_standard_updated uses NotificationPriority.HIGH regardless of change type.",imp:"high",hint:"A minor editorial correction to a standard is very different from a major technical revision."},
  {id:"notif-14",cat:"notifications",q:"Should the system deduplicate notifications across multiple notification methods (in-app, email, digest)?",type:"yes_no",ctx:"In-app notifications and email notifications are created independently — a user may get both.",imp:"medium",hint:"If yes, implement cross-channel dedup so users don't see the same message in multiple places."},
  {id:"notif-15",cat:"notifications",q:"The 7-day dedup window for certificate notifications — is this too long or too short?",type:"single_choice",opts:["7 days is appropriate","Should be 14 days (monthly check cadence)","Should be 3 days (weekly check cadence)","No dedup — always notify"],ctx:"Notification dedup checks for existing notifications within a 7-day window for certificates.",imp:"medium",hint:"If cert expiry checks run daily and dedup is 7 days, a user gets one notification per week per cert."},
  {id:"notif-16",cat:"notifications",q:"Should dismissed notifications still count toward unread counts?",type:"single_choice",opts:["No, dismissed = gone (current)","Show in a separate 'dismissed' section","Allow un-dismissing","Never truly delete — archive instead"],ctx:"Notifications have is_read and is_dismissed flags. Dismissed ones are filtered from the UI.",imp:"medium",hint:"A user may accidentally dismiss an important notification."},
  {id:"notif-17",cat:"notifications",q:"Should the system send push notifications (browser/mobile) for URGENT priority items?",type:"yes_no",ctx:"Notifications are in-app and email only. No push notification support.",imp:"high",hint:"If yes, URGENT notifications like certificate expirations could benefit from immediate push alerts."},
  {id:"notif-18",cat:"notifications",q:"Should the notification system support @mentions to tag specific users in compliance discussions?",type:"yes_no",ctx:"Notifications are system-generated. No user-to-user notification mechanism exists.",imp:"medium",hint:"If yes, enable collaborative compliance workflows where users can alert specific colleagues."},
  {id:"notif-19",cat:"notifications",q:"For task SLA warnings (always HIGH) and breaches (always URGENT), should severity depend on the task's compliance criticality?",type:"single_choice",opts:["Fixed priorities are correct (current)","Based on related entry severity","Based on task priority field","Based on certificate/regulation importance"],ctx:"notify_task_sla_warning always HIGH, notify_task_sla_breached always URGENT.",imp:"medium",hint:"A low-priority task missing its SLA is different from a critical certification task missing its SLA."},
  {id:"notif-20",cat:"notifications",q:"Comment preview truncation at 100 characters — should it be longer for compliance-related comments?",type:"single_choice",opts:["100 characters is sufficient","200 characters for better context","500 characters (match entry truncation)","Show full comment in notification"],ctx:"Comment text truncated to 100 chars in notification preview.",imp:"medium",hint:"Compliance comments often contain regulation references that need more than 100 characters."},
  {id:"notif-21",cat:"notifications",q:"Should the system aggregate multiple notifications about the same entity into a single summary notification?",type:"single_choice",opts:["Individual notifications (current)","Aggregate per entity per day","Aggregate per entity per hour","Smart aggregation based on volume"],ctx:"Each event creates a separate notification. High-volume scenarios can flood the inbox.",imp:"high",hint:"10 separate 'certificate expiring' notifications is less useful than '10 certificates expiring this month'."},
  {id:"notif-22",cat:"notifications",q:"The email batch_size of 50 entries per run at 7:45 AM — what happens to the remaining entries?",type:"single_choice",opts:["Processed next day (current)","Should process all pending in one run","Run additional batches hourly","Process remaining in same run with pagination"],ctx:"send_compliance_entry_emails(batch_size=50). Remaining entries wait for next scheduled run.",imp:"high",hint:"If 500 entries are created overnight, it takes 10 days to send all emails at 50/day."},
  {id:"notif-23",cat:"notifications",q:"Should email notifications include direct action links (e.g., 'Mark as resolved' button in email)?",type:"yes_no",ctx:"Emails include action_url for navigation but no inline action capabilities.",imp:"medium",hint:"If yes, implement email-based actions to reduce the steps needed to respond to compliance issues."},
  {id:"notif-24",cat:"notifications",q:"Should the daily digest email group entries by severity, by product, or by regulation?",type:"single_choice",opts:["By severity (critical first)","By product","By regulation","By entry type (certificate, regulation, etc.)"],ctx:"DigestEmailService aggregates entries but grouping logic may not be explicit.",imp:"medium",hint:"Grouping affects how easily users can prioritize their compliance actions from the digest."},
  {id:"notif-25",cat:"notifications",q:"Should the system send a weekly compliance summary even if there are no new issues?",type:"single_choice",opts:["Only send when there are issues","Always send weekly (confirms system is working)","Send weekly with status confirmation","Organization configures"],ctx:"No 'all clear' notification exists — silence means no issues or system not working.",imp:"medium",hint:"A weekly 'all clear' message confirms the monitoring system is operational."},
  {id:"notif-26",cat:"notifications",q:"When a compliance entry is created for multiple products (product_ids array), should each product owner get a separate notification?",type:"single_choice",opts:["One notification for all (current)","Separate notification per product","Separate per product owner","One notification but CC all product owners"],ctx:"Multi-product entries have product_ids array but single notification creation.",imp:"high",hint:"Different product owners may need different actions for the same regulatory change."},
  {id:"notif-27",cat:"notifications",q:"Should the notification system support snooze (remind me later)?",type:"single_choice",opts:["No snooze needed","Snooze for 1 day/1 week/1 month","Custom snooze duration","Snooze until a specific date"],ctx:"Notifications can be read or dismissed but not snoozed/deferred.",imp:"medium",hint:"Users may want to defer non-urgent compliance items without losing track of them."},
  {id:"notif-28",cat:"notifications",q:"The notification batch creation at 8:00 AM has a batch_size of 100. Is this sufficient?",type:"single_choice",opts:["100 is sufficient","Should be 200","Should be 500","Should process all pending"],ctx:"create-notifications-from-entries at 8:00 AM with batch_size=100.",imp:"medium",hint:"If 500 entries are pending notification, it takes 5 days to create all notifications."},
  {id:"notif-29",cat:"notifications",q:"Should critical compliance notifications bypass the user's notification preferences?",type:"yes_no",ctx:"If user preferences are implemented, critical safety-related notifications should perhaps override them.",imp:"critical",hint:"If yes, URGENT/CRITICAL notifications should always be delivered regardless of user settings."},
  {id:"notif-30",cat:"notifications",q:"Should the system track notification delivery confirmation (did the email actually reach the user)?",type:"yes_no",ctx:"email_sent_at tracks when the system attempted to send, not whether delivery was successful.",imp:"medium",hint:"If yes, implement delivery tracking for compliance-critical communications."},

  // ══════════════════════════════════════════════════════════════════════════
  // DASHBOARD — Additional questions (dash-8 to dash-35)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"dash-8",cat:"dashboard",q:"The deadline countdown widget shows certificates and tasks but not regulation effective dates. Should it include those?",type:"single_choice",opts:["Certificates and tasks only (current)","Add regulation effective dates","Add all compliance-related deadlines","Configurable per organization"],ctx:"get_deadline_countdown_widget queries Certificate.expiry_date and Task.due_date but not regulation dates.",imp:"high",hint:"Regulation effective dates are critical deadlines that should appear on the countdown widget."},
  {id:"dash-9",cat:"dashboard",q:"Task urgency thresholds on the deadline widget: critical <= 3 days, warning <= 7 days. Are these appropriate?",type:"single_choice",opts:["3/7 days is appropriate","5/14 days (more relaxed)","1/3 days (more aggressive)","Depends on task priority"],ctx:"urgency = 'critical' if days_remaining <= 3 else ('warning' if <= 7 else 'normal')",imp:"medium",hint:"A compliance task due in 3 days may already be too late for some certification processes."},
  {id:"dash-10",cat:"dashboard",q:"Certificate urgency thresholds: critical <= 7 days, warning <= 30 days. Should they match the notification thresholds?",type:"single_choice",opts:["Current thresholds are fine","Should match notification thresholds exactly","Should be more aggressive (3/14)","Should be less aggressive (14/60)"],ctx:"urgency = 'critical' if days_remaining <= 7 else ('warning' if <= 30 else 'normal')",imp:"medium",hint:"Inconsistent thresholds between dashboard and notifications can confuse users."},
  {id:"dash-11",cat:"dashboard",q:"The quick actions widget always suggests 'Add New Product' if fewer than 3 actions exist. Is this helpful?",type:"single_choice",opts:["Helpful default","Replace with compliance-specific action","Only show when truly no actions needed","Suggest based on organization maturity"],ctx:"if len(actions) < 3: actions.append({'Add New Product', priority='low'})",imp:"medium",hint:"A mature organization does not need a constant 'Add New Product' suggestion."},
  {id:"dash-12",cat:"dashboard",q:"The certificate timeline widget groups by month using 30-day approximation. Should it use actual calendar months?",type:"single_choice",opts:["30-day approximation is fine","Use actual calendar months","Use quarters instead","Both monthly and quarterly views"],ctx:"month_start = datetime.utcnow() + timedelta(days=i * 30) for 12 months",imp:"medium",hint:"30-day approximation can shift months slightly; February would be off by 2 days."},
  {id:"dash-13",cat:"dashboard",q:"The regulation updates widget shows updates from the last 30 days. Is this the right lookback period?",type:"single_choice",opts:["30 days is appropriate","60 days for better coverage","90 days for quarterly view","Configurable per organization"],ctx:"cutoff_date = datetime.utcnow() - timedelta(days=config.date_range_days) with default 30",imp:"medium",hint:"Regulation changes may take weeks to analyze — 30 days might not show items still being evaluated."},
  {id:"dash-14",cat:"dashboard",q:"Should the dashboard show a 'compliance gap analysis' widget identifying where the organization falls short?",type:"yes_no",ctx:"Current widgets show status but don't explicitly highlight gaps.",imp:"high",hint:"If yes, create a widget that lists specific compliance gaps (missing certs, failed evaluations, etc.)"},
  {id:"dash-15",cat:"dashboard",q:"The regulation 'is_new' flag is set for updates within 7 days. Is 7 days the right threshold?",type:"single_choice",opts:["7 days is appropriate","14 days","30 days","Based on regulation type"],ctx:"'is_new': days_ago <= 7 in regulation updates widget",imp:"medium",hint:"Complex regulations may need more than 7 days to be reviewed and understood."},
  {id:"dash-16",cat:"dashboard",q:"Should the overall compliance score on the dashboard include compliance entries in its calculation?",type:"yes_no",ctx:"Compliance score uses certification coverage + validity + tasks. Does not factor in active WARNING/CRITICAL entries.",imp:"critical",hint:"If yes, active compliance entries should reduce the overall score, making it more reflective of actual status."},
  {id:"dash-17",cat:"dashboard",q:"The trend comparison uses a 30-day lookback based on certificate creation dates. Should it use status change dates instead?",type:"single_choice",opts:["Creation date is fine (current)","Use last status change date","Use both with the most recent","Use entry creation dates for trend"],ctx:"prev_certs filtered by Certificate.created_at <= thirty_days_ago for trend calculation.",imp:"medium",hint:"A certificate created 60 days ago but validated 10 days ago would not show in the 30-day trend."},
  {id:"dash-18",cat:"dashboard",q:"Should the dashboard support custom date ranges for all widgets?",type:"yes_no",ctx:"WidgetConfig.date_range_days defaults to 30 and applies to all widgets uniformly.",imp:"medium",hint:"If yes, users could analyze compliance trends over custom periods (7 days, 90 days, 1 year)."},
  {id:"dash-19",cat:"dashboard",q:"Should the dashboard show a 'compliance velocity' metric (how fast compliance is improving or declining)?",type:"yes_no",ctx:"Current trend shows direction (up/down/stable) and magnitude but not velocity (rate of change).",imp:"medium",hint:"If yes, calculate the rate of change in compliance score over time."},
  {id:"dash-20",cat:"dashboard",q:"The max_items widget config defaults to 10. Should different widgets have different limits?",type:"single_choice",opts:["10 for all is fine","Deadlines: 20, Tasks: 10, Actions: 5","Configurable per widget","Show all items with pagination"],ctx:"WidgetConfig.max_items = 10 applied uniformly across widgets.",imp:"medium",hint:"Deadline countdown may need more items visible than quick actions."},
  {id:"dash-21",cat:"dashboard",q:"Should the dashboard support role-based widget configurations (e.g., executive vs compliance manager views)?",type:"single_choice",opts:["Single view for all users","Executive summary vs detailed view","Role-based widget sets","Fully customizable per user"],ctx:"get_all_widgets returns the same 7 widgets for every user.",imp:"high",hint:"An executive needs a high-level overview; a compliance manager needs detailed action items."},
  {id:"dash-22",cat:"dashboard",q:"Should the product compliance overview sort categories by compliance rate (lowest first)?",type:"single_choice",opts:["Lowest first (current — highlights issues)","Highest first (positive framing)","Alphabetical","By product count per category"],ctx:"categories.sort(key=lambda x: x['compliance_rate']) — lowest first",imp:"medium",hint:"Sorting affects what users see first and prioritize."},
  {id:"dash-23",cat:"dashboard",q:"The compliance score's certification component counts distinct product_ids with ANY valid certificate. Should it count certificate types per market?",type:"single_choice",opts:["Any valid cert is sufficient (current)","Must have required cert types per market","Weighted by certificate completeness","Organization defines required cert coverage"],ctx:"products_with_certs = count(distinct(Certificate.product_id)) where status=VALID",imp:"critical",hint:"A product with only an ISO 9001 cert would count as 'certified' even if it lacks mandatory CE marking."},
  {id:"dash-24",cat:"dashboard",q:"Should dashboard widgets refresh automatically or require manual refresh?",type:"single_choice",opts:["Manual refresh only","Auto-refresh every 5 minutes","Auto-refresh every 30 minutes","Real-time updates via WebSocket"],ctx:"Widgets are loaded on page load with no auto-refresh mechanism.",imp:"medium",hint:"If compliance status changes during the day, stale dashboard data could mislead users."},
  {id:"dash-25",cat:"dashboard",q:"Should the dashboard include a 'recent activity' feed showing compliance-related events?",type:"yes_no",ctx:"AuditLog model is imported but not used in any current dashboard widget.",imp:"medium",hint:"If yes, create an activity feed widget using AuditLog data for compliance event tracking."},

  // ══════════════════════════════════════════════════════════════════════════
  // MONITORING — Additional questions (mon-11 to mon-35)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"mon-11",cat:"monitoring",q:"The system supports 30+ regulatory source types. Should organizations be able to add custom source types?",type:"yes_no",ctx:"MonitorSourceType enum has 30+ values: EU_OJ, EUR_LEX, FDA, UK, CPSC, EUDAMED, etc.",imp:"medium",hint:"If yes, allow organizations to define custom source types with their own fetch logic."},
  {id:"mon-12",cat:"monitoring",q:"Should the HTML normalizer strip more elements to reduce false-positive change detection?",type:"single_choice",opts:["Current normalization is sufficient","Strip all JavaScript and CSS","Strip all non-content elements","Configurable per source type"],ctx:"normalize_html_for_monitoring strips session tokens, CSRF, nav/footer, cache-busting, timestamps before hashing.",imp:"high",hint:"Government websites frequently change non-content elements that trigger false change alerts."},
  {id:"mon-13",cat:"monitoring",q:"MONTHLY frequency maps to 30 days (not calendar months). Should it use actual calendar months?",type:"single_choice",opts:["30 days is fine","Use actual calendar months","Use 28 days (4 weeks)","Configurable"],ctx:"MonitorFrequency.MONTHLY: timedelta(days=30)",imp:"medium",hint:"30-day intervals drift relative to calendar months over time."},
  {id:"mon-14",cat:"monitoring",q:"For HTTP conditional requests (ETag/Last-Modified), should the system cache the full response body as well?",type:"single_choice",opts:["Headers only (current)","Cache body for diff analysis","Cache last N versions","Configurable cache size"],ctx:"HTTPConditionalRequest stores etag and last_modified_header on the monitor but not cached content.",imp:"medium",hint:"Without cached content, the system cannot show what changed — only that something changed."},
  {id:"mon-15",cat:"monitoring",q:"Should monitors for product-linked regulations be checked more frequently than non-product-linked ones?",type:"single_choice",opts:["Same frequency for all (current)","Product-linked: daily, others: weekly","Product-linked get priority ordering (current)","Product-linked: twice daily, others: daily"],ctx:"Product-linked monitors are ordered first but checked at the same configured frequency.",imp:"high",hint:"Product-linked monitors directly affect compliance status and may warrant more frequent checks."},
  {id:"mon-16",cat:"monitoring",q:"Should the system proactively create monitors when a new regulation is linked to a product?",type:"yes_no",ctx:"Monitors must be manually created or created by sync-regulatory-monitors weekly task.",imp:"high",hint:"If yes, auto-create a monitor when a ProductRegulation is created, ensuring no regulation goes unmonitored."},
  {id:"mon-17",cat:"monitoring",q:"The EUR-Lex API client is used for both EU_OFFICIAL_JOURNAL and EU_LEX source types. Should they be differentiated?",type:"single_choice",opts:["Same handler is fine (current)","Different handlers for different content","Different parsing for OJ vs EUR-Lex","Only one source type needed"],ctx:"_fetch_eurlex_content simply calls _fetch_eu_oj_content with the same logic.",imp:"medium",hint:"EU Official Journal and EUR-Lex have different content structures and update patterns."},
  {id:"mon-18",cat:"monitoring",q:"The CELEX extraction uses 5 regex patterns. Are there regulatory reference formats that are missed?",type:"single_choice",opts:["5 patterns cover most cases","Need to add Directive YYYY/NNN/EEC format","Need to add ISO/IEC standard references","Need comprehensive EU reference parser"],ctx:"celex_patterns extracts (EU) YYYY/NNN, (EC) No NNN/YYYY, Regulation (EU), Directive, CELEX:NNNNN formats.",imp:"medium",hint:"Missing patterns could cause the system to not detect when a monitored legal act is referenced in new content."},
  {id:"mon-19",cat:"monitoring",q:"For content hashing, should the system ignore date stamps within the fetched content?",type:"single_choice",opts:["Already handled by normalizer (current)","Need more aggressive date stripping","Should keep dates (they're meaningful)","Configurable per source"],ctx:"_HASH_IGNORE_PREFIXES = ('Fetched:',) plus HTML normalizer strips timestamps.",imp:"medium",hint:"Government sites often embed 'Last updated: DATE' which changes without content changing."},
  {id:"mon-20",cat:"monitoring",q:"Should the system support monitoring PDF documents for changes (e.g., regulation PDFs hosted on government sites)?",type:"yes_no",ctx:"Current monitoring focuses on HTML/RSS/API content. PDFs are not parsed for change detection.",imp:"high",hint:"If yes, implement PDF text extraction and hashing for monitoring regulation document changes."},
  {id:"mon-21",cat:"monitoring",q:"Should monitors support content extraction rules (e.g., 'only monitor section 3.2 of this page')?",type:"single_choice",opts:["Monitor full page (current)","CSS selector-based extraction","XPath-based extraction","AI-powered relevant section extraction"],ctx:"Content is fetched and hashed as a whole. No section-specific monitoring.",imp:"medium",hint:"Monitoring only relevant sections reduces false-positive change detection."},
  {id:"mon-22",cat:"monitoring",q:"The get_due_monitors limit defaults to 100 per run. Is this sufficient for organizations with many monitors?",type:"single_choice",opts:["100 is sufficient","Should be 200","Should be 500","Should process all due monitors"],ctx:"get_due_monitors(limit=100) caps the number of monitors checked per run.",imp:"medium",hint:"An organization monitoring 500 sources would need 5 runs to check all monitors."},
  {id:"mon-23",cat:"monitoring",q:"Should the system detect when a regulatory source becomes permanently unavailable (vs temporary downtime)?",type:"single_choice",opts:["Circuit breaker handles it (current)","Track consecutive weeks of failure","Manual flag after circuit breaker persists","Auto-search for alternative source URLs"],ctx:"Circuit breaker opens after 5 errors, max 24h backoff, but no permanent failure detection.",imp:"medium",hint:"A regulatory website that moved to a new URL will keep triggering the circuit breaker indefinitely."},
  {id:"mon-24",cat:"monitoring",q:"Should monitor executions be retained indefinitely for audit purposes?",type:"single_choice",opts:["Yes, keep all history","Retain for 1 year, then archive","Retain for 90 days","Configurable retention period"],ctx:"MonitorExecution records are created for each check but no cleanup/retention policy exists.",imp:"medium",hint:"Unlimited retention grows the database; too aggressive cleanup loses audit trail."},
  {id:"mon-25",cat:"monitoring",q:"Should the content snapshot pruning task (Sunday 1:30 AM) keep more snapshots for high-priority monitors?",type:"yes_no",ctx:"prune-content-snapshots runs weekly but pruning policy is uniform across all monitors.",imp:"medium",hint:"If yes, retain more history for product-linked monitors to enable better change analysis."},

  // ══════════════════════════════════════════════════════════════════════════
  // IMPACT ANALYSIS — Additional questions (imp-11 to imp-35)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"imp-11",cat:"impact_analysis",q:"The production changeover timeline is 30 days. Should it account for whether the change affects hardware or software?",type:"single_choice",opts:["30 days for all (current)","Software: 7 days, Hardware: 60 days","Based on production volume","Organization provides estimates"],ctx:"BASE_TIMELINES['production_changeover'] = 30 days",imp:"medium",hint:"A firmware update can be deployed in days; retooling a production line takes months."},
  {id:"imp-12",cat:"impact_analysis",q:"Certification costs are only included when severity_factor > 1.2. Should they always be included?",type:"single_choice",opts:["Only for significant changes (current)","Always include certification costs","Include if product has existing certifications","Based on regulation type"],ctx:"if severity_factor > 1.2: costs.append(CostBreakdown(CERTIFICATION, ...))",imp:"high",hint:"Even minor regulatory changes may require re-certification for some product types."},
  {id:"imp-13",cat:"impact_analysis",q:"Redesign costs are only included when severity_factor > 1.5. Is this threshold correct?",type:"single_choice",opts:["1.5 is appropriate","Should be 1.2 (include more often)","Should be 2.0 (only for critical)","Should be based on change type, not severity"],ctx:"if severity_factor > 1.5: costs.append(CostBreakdown(REDESIGN, ...))",imp:"medium",hint:"Redesign may be needed for medium-severity changes depending on the specific requirement."},
  {id:"imp-14",cat:"impact_analysis",q:"When no products directly match a regulation change, the engine falls back to all org products (limited to 10). Is this correct?",type:"single_choice",opts:["Fallback to all products is reasonable","Should only analyze matched products","Fallback to products in same category","No fallback — report zero affected"],ctx:"if not products: products = all_org_products[:10]",imp:"high",hint:"Analyzing all products for an unmatched regulation change may produce misleading impact estimates."},
  {id:"imp-15",cat:"impact_analysis",q:"Should the impact analysis distinguish between one-time costs and recurring annual costs?",type:"yes_no",ctx:"All costs are presented as one-time estimates. No recurring cost tracking.",imp:"high",hint:"If yes, regulatory fees and compliance monitoring are recurring costs that should be separated."},
  {id:"imp-16",cat:"impact_analysis",q:"The documentation update cost uses a 0.5 multiplier (half the product multiplier). Is this appropriate?",type:"single_choice",opts:["0.5 multiplier is appropriate","Should be 0.3 (docs are mostly shared)","Should be 0.7 (each product needs unique docs)","Should be 1.0 (same as testing)"],ctx:"doc_cost = BASE_COSTS[DOCUMENTATION] * product_multiplier * 0.5",imp:"medium",hint:"Technical documentation may be shared across products or completely unique per product."},
  {id:"imp-17",cat:"impact_analysis",q:"Should impact analyses include a 'do nothing' scenario showing the cost of non-compliance?",type:"yes_no",ctx:"Analyses only show compliance costs, not the cost of failing to comply.",imp:"critical",hint:"If yes, include potential fines, market access loss, and reputational damage in the analysis."},
  {id:"imp-18",cat:"impact_analysis",q:"The testing timeline scales as: 30 days * min(1.0 + product_count * 0.05, 1.5). Is the 1.5x cap appropriate?",type:"single_choice",opts:["1.5x cap is appropriate","Should be 2.0x for large portfolios","Should not cap","Should scale with test complexity, not product count"],ctx:"test_days = BASE_TIMELINES['testing_phase'] * min(1.0 + (product_count * 0.05), 1.5)",imp:"medium",hint:"Testing 20+ products caps at 45 days; is that realistic for extensive product testing?"},
  {id:"imp-19",cat:"impact_analysis",q:"Should the impact analysis engine use historical data from past analyses to improve estimates?",type:"yes_no",ctx:"Each analysis is calculated from base costs/timelines with no learning from past actuals.",imp:"high",hint:"If yes, compare estimated vs actual costs from completed analyses to calibrate future estimates."},
  {id:"imp-20",cat:"impact_analysis",q:"The Multi-LLM validation prompt asks for a confidence level 0-100. Should it also request uncertainty ranges?",type:"yes_no",ctx:"LLM prompt asks for confidence but not upper/lower bounds on cost estimates.",imp:"medium",hint:"If yes, show cost ranges (e.g., $50K-$150K) rather than single-point estimates."},
  {id:"imp-21",cat:"impact_analysis",q:"Should impact analyses be automatically triggered when a regulation change is detected, or only on demand?",type:"single_choice",opts:["Auto-triggered for all changes (current 5:20 AM task)","Only for high-impact changes","Only when user requests","Auto for product-linked, on-demand for others"],ctx:"auto-create-impact-analyses runs at 5:20 AM for recent changes.",imp:"high",hint:"Automatic analysis ensures timely awareness but uses LLM resources for every change."},
  {id:"imp-22",cat:"impact_analysis",q:"Should the training rollout timeline (14 days) scale with organization size?",type:"single_choice",opts:["14 days for all (current)","Scale with employee count","Scale with number of affected roles","Organization provides their estimate"],ctx:"BASE_TIMELINES['training_rollout'] = 14 days regardless of org size.",imp:"medium",hint:"Training 10 people takes less time than training 1,000 across multiple sites."},
  {id:"imp-23",cat:"impact_analysis",q:"Should impact analyses be linked to the compliance entries they relate to?",type:"yes_no",ctx:"Impact analyses reference regulation_change_id but have no direct link to ComplianceEntry.",imp:"high",hint:"If yes, linking enables users to see the impact analysis from the compliance entry view."},
  {id:"imp-24",cat:"impact_analysis",q:"The requirement mapping timeline (21 days * severity_factor) does not account for the number of requirements. Should it?",type:"single_choice",opts:["Severity factor alone is sufficient","Scale with estimated requirement count","Scale with regulation page count","Both severity and requirement count"],ctx:"map_days = BASE_TIMELINES['requirement_mapping'] * severity_factor",imp:"medium",hint:"Mapping 5 new requirements is different from mapping 50."},
  {id:"imp-25",cat:"impact_analysis",q:"Should the system track actual costs incurred against impact analysis estimates?",type:"yes_no",ctx:"Impact analyses store estimates but there is no mechanism to record actual costs.",imp:"high",hint:"If yes, actual-vs-estimated tracking enables continuous improvement of cost estimation accuracy."},

  // ══════════════════════════════════════════════════════════════════════════
  // REGULATIONS — Additional questions (reg-8 to reg-30)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"reg-8",cat:"regulations",q:"Should the system track regulation transition periods and warn when the old version can no longer be used?",type:"yes_no",ctx:"New regulation versions often have transition periods. The system does not track these explicitly.",imp:"critical",hint:"If yes, model transition period start/end dates and create entries when the end date approaches."},
  {id:"reg-9",cat:"regulations",q:"For regulation changes, should the system try to identify which specific clauses/articles changed?",type:"single_choice",opts:["Not needed — flag the whole regulation","Identify changed articles","Identify changed articles and summarize changes","Full clause-level diff with AI analysis"],ctx:"Regulation changes are detected at the whole-document level. No clause-level tracking.",imp:"high",hint:"Clause-level change detection enables targeted compliance review instead of full re-evaluation."},
  {id:"reg-10",cat:"regulations",q:"Should the system distinguish between 'regulation' and 'directive' for EU legislation?",type:"yes_no",ctx:"EU regulations are directly applicable; directives must be transposed into national law.",imp:"high",hint:"If yes, directives need country-specific tracking of national transposition status."},
  {id:"reg-11",cat:"regulations",q:"Should regulations have a 'maturity' status (draft, published, effective, repealed)?",type:"single_choice",opts:["Not needed","Yes, full lifecycle tracking","Only track effective and repealed","Track all stages including proposals"],ctx:"Regulations have is_active and updated_at but no lifecycle status.",imp:"high",hint:"Lifecycle tracking helps organizations prepare for upcoming regulations before they take effect."},
  {id:"reg-12",cat:"regulations",q:"Should the system detect when two regulations apply to the same product with conflicting requirements?",type:"yes_no",ctx:"Knowledge graph has 'conflicts_with' relationship type but no automated conflict detection from product-regulation matches.",imp:"critical",hint:"If yes, implement automated conflict detection by analyzing regulations applied to the same product."},
  {id:"reg-13",cat:"regulations",q:"Should the system automatically identify which regulations apply to a product based on its category and target markets?",type:"single_choice",opts:["Manual assignment only","AI-suggested with human confirmation","Fully automatic based on rules","Automatic for common categories, manual for others"],ctx:"ProductRegulation records are manually created. No auto-identification of applicable regulations.",imp:"critical",hint:"Automated regulation-product matching is a core value proposition for compliance software."},
  {id:"reg-14",cat:"regulations",q:"For the 24-hour change detection window, what happens if the Celery task fails and is retried the next day?",type:"single_choice",opts:["Changes in the missed period are lost","Retry processes the same 24-hour window (current)","Should use last successful run timestamp","Should use overlapping windows (36 hours)"],ctx:"cutoff = datetime.now() - timedelta(hours=24). autoretry_for=(Exception,), max_retries=3.",imp:"high",hint:"If all 3 retries fail, the 24-hour window moves forward and changes from that period are missed."},
  {id:"reg-15",cat:"regulations",q:"Should regulation applicability be assessed at the market (country) level, not just product level?",type:"yes_no",ctx:"ProductRegulation links product to regulation but has no country dimension.",imp:"high",hint:"If yes, a regulation may apply to product A in the EU but not in the US."},
  {id:"reg-16",cat:"regulations",q:"The non-compliant regulation task scans ALL non-compliant ProductRegulation records every day. Should it only scan recent changes?",type:"single_choice",opts:["Scan all daily (current)","Only scan status changes in last 24 hours","Only scan newly non-compliant","Scan all but with dedup optimization"],ctx:"create_noncompliant_regulation_entries queries ProductRegulation.compliance_status == 'non_compliant' with no date filter.",imp:"medium",hint:"Scanning all records daily works but is wasteful — dedup catches most as duplicates."},
  {id:"reg-17",cat:"regulations",q:"Should the system track which version of a regulation a product was evaluated against?",type:"yes_no",ctx:"ProductRegulation has compliance_status but no regulation_version field.",imp:"critical",hint:"If yes, when a regulation is updated, the system knows which products were evaluated against the old version."},
  {id:"reg-18",cat:"regulations",q:"Should regulation changes with 'repeal' type automatically mark all product-regulation links as requiring re-evaluation?",type:"yes_no",ctx:"Repeal means the regulation is being withdrawn. Products may need to find alternative compliance paths.",imp:"critical",hint:"If yes, a repealed regulation should trigger a different workflow than an amendment."},
  {id:"reg-19",cat:"regulations",q:"Should the system track regulation enforcement actions and penalties?",type:"yes_no",ctx:"No enforcement action tracking exists in the system.",imp:"high",hint:"If yes, enforcement data helps assess the practical risk of non-compliance for each regulation."},
  {id:"reg-20",cat:"regulations",q:"Should the dedup mechanism for regulation change entries consider the organization as part of the dedup key?",type:"yes_no",ctx:"Checksum includes headline + entity IDs. Organization is checked separately in the dedup query filter.",imp:"medium",hint:"Organization scoping in the query filter already handles this, but including it in the checksum adds extra safety."},
  {id:"reg-21",cat:"regulations",q:"For standard updates, should the system differentiate between harmonised and non-harmonised standards?",type:"single_choice",opts:["Treat all standards the same (current)","Harmonised standards get higher severity","Harmonised standards trigger different workflow","Different notification recipients"],ctx:"Standard change entries use the same logic regardless of standard_type.",imp:"high",hint:"Harmonised standards carry legal significance (presumption of conformity) that non-harmonised ones do not."},
  {id:"reg-22",cat:"regulations",q:"Should the product summary in regulation change entries show more than 3 product names?",type:"single_choice",opts:["3 names + count is sufficient","Show 5 names","Show all names","Show names based on entry body character limit"],ctx:"product_names = [p.name for p in products[:3]], remaining = len(products) - 3",imp:"medium",hint:"For multi-product entries, showing only 3 names may not help users identify which products matter most."},
  {id:"reg-23",cat:"regulations",q:"Should the system support regulation 'tagging' (e.g., safety, environmental, quality) for filtering?",type:"yes_no",ctx:"Regulations have jurisdiction and category but no free-form tagging system.",imp:"medium",hint:"If yes, tags enable more flexible filtering and grouping of regulations on the dashboard."},

  // ══════════════════════════════════════════════════════════════════════════
  // PRODUCTS — Additional questions (prod-11 to prod-30)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"prod-11",cat:"products",q:"Should the system enforce that every active product must have at least one target country?",type:"yes_no",ctx:"Products can exist without target_countries, making them invisible on the compliance map.",imp:"high",hint:"If yes, require target countries during product creation for compliance map coverage."},
  {id:"prod-12",cat:"products",q:"Should product compliance status be cached or calculated in real-time?",type:"single_choice",opts:["Real-time calculation (current)","Cache with hourly refresh","Cache with event-driven invalidation","Both cached and real-time available"],ctx:"get_max_entry_type_for_products queries the database on every compliance map load.",imp:"medium",hint:"Real-time is accurate but slow for large datasets; caching is fast but may be stale."},
  {id:"prod-13",cat:"products",q:"Should products support multiple lifecycle phases (concept, development, production, end-of-life)?",type:"single_choice",opts:["Not needed","Yes, with different compliance rules per phase","Yes, for tracking only","Yes, with phase-based entry filtering"],ctx:"Products have is_active boolean but no lifecycle phase tracking.",imp:"high",hint:"A product in development has different compliance needs than one in production."},
  {id:"prod-14",cat:"products",q:"For multi-product compliance entries (product_ids array), should the entry appear on each product's individual compliance view?",type:"yes_no",ctx:"get_entries_for_product uses JSONB containment to find entries where product_ids contains the product.",imp:"medium",hint:"If yes (current behavior), the same entry appears multiple times across different product views."},
  {id:"prod-15",cat:"products",q:"Should the system support product hierarchies (e.g., platform -> product -> variant)?",type:"single_choice",opts:["Flat product list (current)","Parent-child relationships","Three-level hierarchy","Configurable hierarchy depth"],ctx:"Product model has no parent_id or hierarchy support.",imp:"high",hint:"Product platforms and variants are common in manufacturing and affect compliance scope."},
  {id:"prod-16",cat:"products",q:"Should product deactivation automatically resolve all its compliance entries?",type:"single_choice",opts:["No, keep entries active (current)","Yes, auto-resolve all entries","Auto-resolve but keep for audit","Only resolve INFO/TASK, keep WARNING/CRITICAL"],ctx:"Deactivating a product (is_active=False) does not affect its compliance entries.",imp:"medium",hint:"An inactive product may still have legacy compliance obligations."},
  {id:"prod-17",cat:"products",q:"Should the system track Bill of Materials (BOM) for compliance purposes (e.g., REACH/RoHS substance tracking)?",type:"yes_no",ctx:"No BOM or substance tracking exists in the product model.",imp:"high",hint:"If yes, BOM tracking enables material-level compliance checking for chemical regulations."},
  {id:"prod-18",cat:"products",q:"For the compliance rate calculation (products_with_certs / total_products), should inactive products be excluded?",type:"yes_no",ctx:"Analytics compliance rate includes is_active filter but the formula treats uncertified active products as non-compliant.",imp:"medium",hint:"If yes (current behavior), only active products affect the compliance rate."},
  {id:"prod-19",cat:"products",q:"Should the system support product grouping for batch compliance actions (e.g., certify all products in a group)?",type:"yes_no",ctx:"Products are managed individually. No batch compliance operations exist.",imp:"medium",hint:"If yes, enable batch actions like 'assign regulation to all products in category X'."},
  {id:"prod-20",cat:"products",q:"Should product target_countries include US states (e.g., US-CA for California)?",type:"single_choice",opts:["Country-level only","Include US states","Include states for US and other federal countries","Configurable per market"],ctx:"Map supports US-XX codes for US states, hasUsTargets checks for these codes.",imp:"high",hint:"California, New York, and other states have distinct compliance requirements (e.g., Prop 65)."},

  // ══════════════════════════════════════════════════════════════════════════
  // GENERAL — Additional questions (gen-9 to gen-30)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"gen-9",cat:"general",q:"Should multi-tenancy enforce that no data ever leaks between organizations, even in aggregate statistics?",type:"yes_no",ctx:"All queries filter by organization_id but aggregate endpoints could theoretically leak cross-org data.",imp:"critical",hint:"If yes, verify that ALL endpoints, including admin and analytics, are org-scoped."},
  {id:"gen-10",cat:"general",q:"Should the system support regulatory sandbox regimes (where products can be sold without full compliance)?",type:"yes_no",ctx:"Some jurisdictions offer regulatory sandboxes for innovative products.",imp:"medium",hint:"If yes, track sandbox eligibility and expiration as a compliance status."},
  {id:"gen-11",cat:"general",q:"Should the system's compliance assessment be considered legally binding, or advisory only?",type:"single_choice",opts:["Advisory only (current implicit)","Advisory with explicit disclaimer","Can be used as compliance evidence","Depends on jurisdiction"],ctx:"No legal disclaimer or advisory notice is shown in the system.",imp:"critical",hint:"Legal framing affects liability. An advisory system has lower liability than one presented as authoritative."},
  {id:"gen-12",cat:"general",q:"Should the system track which users made compliance decisions (e.g., who confirmed a product as compliant)?",type:"yes_no",ctx:"ComplianceEntry tracks completed_by but ProductRegulation.compliance_status has no change tracking.",imp:"high",hint:"If yes, implement audit logging for all compliance status changes for regulatory accountability."},
  {id:"gen-13",cat:"general",q:"Is it important to distinguish between 'product safety' regulations and 'market access' regulations?",type:"yes_no",ctx:"The system treats all regulations equally in compliance scoring and priority.",imp:"high",hint:"If yes, safety regulations should have higher priority and different escalation paths."},
  {id:"gen-14",cat:"general",q:"Should the system support import/export of compliance data for regulatory submissions?",type:"yes_no",ctx:"No standardized export format for regulatory submission data exists.",imp:"high",hint:"If yes, implement export in formats accepted by regulatory bodies (e.g., EUDAMED XML, FDA eCopy)."},
  {id:"gen-15",cat:"general",q:"Should the system integrate with ERP/PLM systems for product data synchronization?",type:"yes_no",ctx:"Products are managed directly in ProductLex with no ERP/PLM integration.",imp:"medium",hint:"If yes, implement API integrations or webhooks for bidirectional product data sync."},
  {id:"gen-16",cat:"general",q:"Should archived/completed compliance entries be retained indefinitely for audit purposes?",type:"single_choice",opts:["Retain indefinitely (current)","Retain for 10 years","Retain per regulation requirements","Configurable retention policy"],ctx:"Completed entries are soft-deleted (is_active) and never purged.",imp:"high",hint:"Some regulations require compliance records to be retained for specific periods (e.g., 10 years for MDR)."},
  {id:"gen-17",cat:"general",q:"Should the system enforce that compliance assessments are reviewed by a second person?",type:"yes_no",ctx:"Compliance entries can be completed by any authorized user without peer review.",imp:"high",hint:"If yes, implement a maker-checker workflow for compliance decisions."},
  {id:"gen-18",cat:"general",q:"Should the system track external audit findings and map them to compliance entries?",type:"yes_no",ctx:"No external audit integration exists. Audit findings are not tracked in the system.",imp:"high",hint:"If yes, import audit findings and link them to specific products, regulations, and compliance entries."},
  {id:"gen-19",cat:"general",q:"Should there be a 'compliance freeze' capability to prevent changes during audit periods?",type:"yes_no",ctx:"No mechanism exists to prevent compliance data changes during audits.",imp:"medium",hint:"If yes, implement a read-only mode during audit periods to ensure data integrity."},
  {id:"gen-20",cat:"general",q:"Should the system support compliance attestation (formal sign-off by responsible persons)?",type:"yes_no",ctx:"No formal attestation/sign-off workflow exists.",imp:"high",hint:"If yes, implement digital attestation workflows for regulatory compliance sign-offs."},

  // ══════════════════════════════════════════════════════════════════════════
  // COMPLIANCE MAP — Additional questions (map-15 to map-30)
  // ══════════════════════════════════════════════════════════════════════════
  {id:"map-15",cat:"compliance_status",q:"Should the compliance map support filtering by product category?",type:"yes_no",ctx:"Map shows all products per country with no category filter.",imp:"high",hint:"If yes, users could see compliance status for only medical devices, or only electronics, etc."},
  {id:"map-16",cat:"compliance_status",q:"Should the map show a 'coverage' metric (what percentage of products have been assessed)?",type:"yes_no",ctx:"Map shows compliance status but not assessment coverage — products without entries appear as Compliant.",imp:"critical",hint:"If yes, distinguish between 'assessed and compliant' vs 'not yet assessed'."},
  {id:"map-17",cat:"compliance_status",q:"Should entries from the predictive_bridge source be excluded from the main compliance map by default?",type:"single_choice",opts:["Exclude by default (currently via exclude_sources)","Include by default","Show with a visual distinction (dotted border)","User toggles predictive layer"],ctx:"get_max_entry_type_for_products has exclude_sources parameter for filtering out predictive_bridge.",imp:"high",hint:"Mixing predictions with actual compliance status could confuse users about their true compliance posture."},
  {id:"map-18",cat:"compliance_status",q:"Should the compliance map support drill-down from country to product to specific compliance entry?",type:"yes_no",ctx:"Map shows country-level status. Product-level drill-down depends on the UI implementation.",imp:"high",hint:"If yes, ensure three-level navigation: country -> products in that country -> entries per product."},
